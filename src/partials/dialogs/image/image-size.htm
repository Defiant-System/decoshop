<div class="dialog-box" data-dlg="dlgImageSize">
	<div class="dlg-content">
		<div class="fields push-rows">
			<h2>
				<i class="icon-dlg-close" data-click="dlg-close"></i>
				Image Size
			</h2>

			<div class="field-row">
				<div class="option select" data-options="fieldset-inline-menubox" data-match="//Units">
					<span class="label">Units</span>
					<span class="value">Pixels</span>
				</div>
			</div>
			
			<div class="linked-2">
				<i class="icon-linked" data-click="toggle-ratio-linked"></i>
			</div>

			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Width</span>
					<span class="value">
						<input type="text" name="canvas-width" data-min="1" data-max="999" value="100" data-default="100"/>
					</span>
				</div>
				<div class="knob" data-change="set-canvas-width"></div>
			</div>
			
			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Height</span>
					<span class="value">
						<input type="text" name="canvas-height" data-min="1" data-max="999" value="100" data-default="100"/>
					</span>
				</div>
				<div class="knob" data-change="set-canvas-height"></div>
			</div>
			
			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Resolution</span>
					<span class="value">
						<input type="text" name="field-2" data-min="1" data-max="600" value="300"/>
					</span>
				</div>
				<div class="knob" data-change="set-resolution"></div>
			</div>

			<div class="field-row">
				<div class="option select" data-options="fieldset-inline-menubox" data-match="//DpiUnits">
					<span class="label">DPI Units</span>
					<span class="value">Pixels / Inch</span>
				</div>
			</div>

			<div class="field-row">
				<div class="option">
					<span class="label"></span>
					<div class="toggler" data-value="on" data-name="resampled" data-default="on" data-click="toggle-resampled">
						<span>Resample</span>
					</div>
				</div>
			</div>

			<div class="field-row">
				<div class="option select" data-options="fieldset-inline-menubox" data-match="//ImageInterpolation">
					<span class="label">Interpolation</span>
					<span class="value">Bilinear</span>
				</div>
			</div>

		</div>
		<div class="buttons">
			<div class="button" data-click="dlg-ok">OK</div>
			<div class="button" data-click="dlg-reset">Reset</div>
			<div class="toggler" data-value="on" data-click="dlg-preview">
				<span>Preview</span>
			</div>
		</div>
	</div>
</div>
