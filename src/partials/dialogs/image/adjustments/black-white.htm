<div class="dialog-box" data-dlg="dlgBlackWhite">
	<div class="dlg-content">
		<div class="fields">
			<h2>
				<i class="icon-dlg-close" data-click="dlg-close"></i>
				Black &amp; White
			</h2>

			<div class="field-row has-preset">
				<div class="option">
					<span class="label">Tint</span>
					<div class="toggler" data-value="on" data-name="resample" data-default="on" data-click="toggle-resample">
						<span>Resample</span>
					</div>
					<span class="color-preset pull inline-menu" style="background: #ffffff;" data-default="#ffffff" data-name="color" data-change="set-color" data-options="swatches" data-match="//Swatches"></span>
				</div>
			</div>

			<div class="field-row has-basic-range">
				<div class="option input">
					<span class="label">Red</span>
					<span class="value">
						<span data-id="channelRed" data-default="40">40</span>
					</span>
				</div>
				<div class="slider" data-min="-200" data-max="300" data-target="channelRed" data-ux="br-track" data-range="range-red" data-change="set-red">
					<span class="handle" data-ux="br-handle"></span>
				</div>
			</div>

			<div class="field-row has-basic-range">
				<div class="option input">
					<span class="label">Yellow</span>
					<span class="value">
						<span data-id="channelYellow" data-default="85">85</span>
					</span>
				</div>
				<div class="slider" data-min="-200" data-max="300" data-target="channelYellow" data-ux="br-track" data-range="range-yellow" data-change="set-yellow">
					<span class="handle" data-ux="br-handle"></span>
				</div>
			</div>

			<div class="field-row has-basic-range">
				<div class="option input">
					<span class="label">Green</span>
					<span class="value">
						<span data-id="channelGreen" data-default="204">204</span>
					</span>
				</div>
				<div class="slider" data-min="-200" data-max="300" data-target="channelGreen" data-ux="br-track" data-range="range-green" data-change="set-green">
					<span class="handle" data-ux="br-handle"></span>
				</div>
			</div>

			<div class="field-row has-basic-range">
				<div class="option input">
					<span class="label">Cyan</span>
					<span class="value">
						<span data-id="channelCyan" data-default="60">60</span>
					</span>
				</div>
				<div class="slider" data-min="-200" data-max="300" data-target="channelCyan" data-ux="br-track" data-range="range-cyan" data-change="set-cyan">
					<span class="handle" data-ux="br-handle"></span>
				</div>
			</div>

			<div class="field-row has-basic-range">
				<div class="option input">
					<span class="label">Blue</span>
					<span class="value">
						<span data-id="channelBlue" data-default="20">20</span>
					</span>
				</div>
				<div class="slider" data-min="-200" data-max="300" data-target="channelBlue" data-ux="br-track" data-range="range-blue" data-change="set-blue">
					<span class="handle" data-ux="br-handle"></span>
				</div>
			</div>

			<div class="field-row has-basic-range">
				<div class="option input">
					<span class="label">Magenta</span>
					<span class="value">
						<span data-id="channelMagenta" data-default="80">80</span>
					</span>
				</div>
				<div class="slider" data-min="-200" data-max="300" data-target="channelMagenta" data-ux="br-track" data-range="range-magenta" data-change="set-magenta">
					<span class="handle" data-ux="br-handle"></span>
				</div>
			</div>

		</div>
		<div class="buttons">
			<div class="button" data-click="dlg-ok">OK</div>
			<div class="button" data-click="dlg-reset">Reset</div>
			<div class="toggler" data-value="on" data-click="dlg-preview">
				<span>Preview</span>
			</div>
		</div>
	</div>
</div>
