<div class="dialog-box" data-dlg="dlgBrightnessContrast">
	<div class="dlg-content">
		<div class="fields">
			<h2>
				<i class="icon-dlg-close" data-click="dlg-close"></i>
				Brightness / Contrast
			</h2>

			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Brightness</span>
					<span class="value"><input type="text" name="brightness" value="0" data-min="-150" data-max="150" data-default="0"></span>
				</div>
				<div class="pan-knob" data-change="set-brightness"></div>
			</div>
			
			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Contrast</span>
					<span class="value"><input type="text" name="contrast" value="0" data-min="-100" data-max="100" data-default="0"></span>
				</div>
				<div class="pan-knob" data-change="set-contrast"></div>
			</div>
		</div>
		<div class="buttons">
			<div class="button" data-click="dlg-ok">OK</div>
			<div class="button" data-click="dlg-reset">Reset</div>
			<div class="toggler" data-value="on" data-click="dlg-preview">
				<span>Preview</span>
			</div>
		</div>
	</div>
</div>
