<div class="dialog-box" data-dlg="dlgGradientMap">
	<div class="dlg-content">
		<div class="fields">
			<h2>
				<i class="icon-dlg-close" data-click="dlg-close"></i>
				Gradient Map
			</h2>

			<div class="field-row has-gradient">
				<div class="option opt-gradient" data-name="gradient" data-change="set-gradient" data-options="pop-gradient-strips" data-match="//Gradients">
					<span class="label">Gradient</span>
					<div class="value">
						<div class="gradient-strip" data-hash="a01a42f9c8d0d77dd4c96b1250d9759677c33c39"></div>
					</div>
				</div>
			</div>

			<div class="field-row">
				<div class="option">
					<span class="label"></span>
					<div class="toggler" data-value="off" data-name="reverse" data-default="off" data-click="toggle-reverse">
						<span>Reverse</span>
					</div>
				</div>
			</div>
			
		</div>
		<div class="buttons">
			<div class="button" data-click="dlg-ok">OK</div>
			<div class="button" data-click="dlg-reset">Reset</div>
			<div class="toggler" data-value="on" data-click="dlg-preview">
				<span>Preview</span>
			</div>
		</div>
	</div>
</div>
