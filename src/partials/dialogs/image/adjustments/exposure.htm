<div class="dialog-box" data-dlg="dlgExposure">
	<div class="dlg-content">
		<div class="fields">
			<h2>
				<i class="icon-dlg-close" data-click="dlg-close"></i>
				Exposure
			</h2>

			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Exposure</span>
					<span class="value">
						<input type="text" name="exposure" data-min="0" data-max="400" value="0" data-default="0"/>
					</span>
				</div>
				<div class="knob" data-change="set-exposure"></div>
			</div>

			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Offset</span>
					<span class="value">
						<input type="text" name="offset" data-min="-0.5" data-max="0.5" value="0" data-default="0" data-step="0.005"/>
					</span>
				</div>
				<div class="knob" data-change="set-offset"></div>
			</div>

			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Gamma Correction</span>
					<span class="value">
						<input type="text" name="gamma" data-min="0" data-max="400" value="1" data-default="1"/>
					</span>
				</div>
				<div class="knob" data-change="set-gamma"></div>
			</div>
		</div>
		<div class="buttons">
			<div class="button" data-click="dlg-ok">OK</div>
			<div class="button" data-click="dlg-reset">Reset</div>
			<div class="toggler" data-value="on" data-click="dlg-preview">
				<span>Preview</span>
			</div>
		</div>
	</div>
</div>
