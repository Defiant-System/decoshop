<div class="dialog-box" data-dlg="dlgPhotoFilter">
	<div class="dlg-content">
		<div class="fields">
			<h2>
				<i class="icon-dlg-close" data-click="dlg-close"></i>
				Photo Filter
			</h2>

			<div class="field-row has-preset">
				<div class="option">
					<span class="label">Color</span>
					<span class="color-preset pull inline-menu" style="background: #f00;" data-options="swatches" data-match="//Swatches"></span>
				</div>
			</div>

			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Density</span>
					<span class="value"><input type="text" name="amount" data-min="0" data-max="100" value="80%" data-default="80%" data-suffix="%"></span>
				</div>
				<div class="knob" data-value="80"></div>
			</div>

			<div class="field-row">
				<div class="option">
					<span class="label">Luminosity</span>
					<div class="toggler" data-value="on">
						<span>Preserve</span>
					</div>
				</div>
			</div>
		</div>
		<div class="buttons">
			<div class="button" data-click="dlg-ok">OK</div>
			<div class="button" data-click="dlg-reset">Reset</div>
			<div class="toggler" data-value="on" data-click="dlg-preview">
				<span>Preview</span>
			</div>
		</div>
	</div>
</div>
