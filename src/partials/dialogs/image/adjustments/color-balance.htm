<div class="dialog-box" data-dlg="dlgColorBalance">
	<div class="dlg-content">
		<div class="fields">
			<h2>
				<i class="icon-dlg-close" data-click="dlg-close"></i>
				Color Balance
			</h2>

			<div class="field-row">
				<div class="option opt-group">
					<span class="label">Tone Balance</span>
					<span class="value">
						<ul class="opt-group">
							<li>Shadows</li>
							<li class="active">Midtones</li>
							<li>Highlights</li>
						</ul>
					</span>
				</div>
			</div>

			<div class="field-row">
				<div class="option">
					<span class="label">Luminosity</span>
					<div class="toggler" data-value="on" data-name="preserve" data-default="on" data-click="toggle-preserve">
						<span>Preserve</span>
					</div>
				</div>
			</div>

			<div class="field-row has-range">
				<div class="option input">
					<span class="label">Levels</span>
					<span class="value">
						<span data-id="cyan-red">0</span>
						<span data-id="magenta-green">0</span>
						<span data-id="yellow-blue">0</span>
					</span>
				</div>
				<div class="slider" data-min="-100" data-max="100" data-change="set-cyan-red-value" data-ux="br-track" data-target="cyan-red" data-range="cyan-red">
					<span class="name-left">Cyan</span>
					<span class="handle" data-ux="br-handle"></span>
					<span class="name-right">Red</span>
				</div>
				<div class="slider" data-min="-100" data-max="100" data-change="set-magenta-green-value" data-ux="br-track" data-target="magenta-green" data-range="magenta-green">
					<span class="name-left">Magenta</span>
					<span class="handle" data-ux="br-handle"></span>
					<span class="name-right">Green</span>
				</div>
				<div class="slider" data-min="-100" data-max="100" data-change="set-yellow-blue-value" data-ux="br-track" data-target="yellow-blue" data-range="yellow-blue">
					<span class="name-left">Yellow</span>
					<span class="handle" data-ux="br-handle"></span>
					<span class="name-right">Blue</span>
				</div>
			</div>
		</div>
		<div class="buttons">
			<div class="button" data-click="dlg-ok">OK</div>
			<div class="button" data-click="dlg-reset">Reset</div>
			<div class="toggler" data-value="on" data-click="dlg-preview">
				<span>Preview</span>
			</div>
		</div>
	</div>
</div>
