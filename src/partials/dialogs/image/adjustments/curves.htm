<div class="dialog-box" data-dlg="dlgCurves">
	<div class="dlg-content">
		<div class="fields">
			<h2>
				<i class="icon-dlg-close" data-click="dlg-close"></i>
				Curves
			</h2>

			<!-- <div class="field-row">
				<div class="option select" data-change="set-preset" data-name="preset" data-options="fieldset-inline-menubox" data-match="//CurvesPresets">
					<span class="label">Preset</span>
					<span class="value">Custom</span>
				</div>
			</div> -->

			<div class="field-row">
				<div class="option select" data-change="set-channel" data-name="channel" data-options="fieldset-inline-menubox" data-match="//CurveChannels">
					<span class="label">Channel</span>
					<span class="value" data-default="RGB">RGB</span>
					<!-- <span class="button">Auto</span> -->
				</div>
			</div>

			<div class="field-row">
				<div class="option select" data-change="set-algorithm" data-name="algorithm" data-options="fieldset-inline-menubox" data-match="//CurveAlgorithms">
					<span class="label">Algorithm</span>
					<span class="value" data-default="None">None</span>
				</div>
			</div>

			<div class="field-row has-graph">
				<div class="option-bar" data-click="reset-pipette">
					<i class="tool-spline active"></i>
					<i class="tool-sketch"></i>

					<i class="tool-ns-resize"></i>
					<i class="tool-pipette-dark" data-click="select-pipette" data-arg="1"></i>
					<i class="tool-pipette-mid" data-click="select-pipette" data-arg="2"></i>
					<i class="tool-pipette-light" data-click="select-pipette" data-arg="3"></i>
				</div>
				<div class="graph curves">
					<canvas></canvas>
					<svg viewBox="0 0 250 251">
						<!-- <path d="M 0 250 L 80 200 Q 250 250 250 0"></path> -->
						<!-- <path d="M 0 250 Q 230 230 250 0"></path> -->
						<path d="M 0 250 L 250 0"></path>
					</svg>
					<div class="range-h"></div>
					<div class="slider range-v">
						<span class="handle" data-for="input" style="left: 0px;"></span>
						<span class="handle" data-for="output" style="left: 249px;"></span>
					</div>
				</div>
			</div>

		</div>
		<div class="buttons">
			<div class="button" data-click="dlg-ok">OK</div>
			<div class="button" data-click="dlg-reset">Reset</div>
			<div class="toggler" data-value="on" data-click="dlg-preview">
				<span>Preview</span>
			</div>
		</div>
	</div>
</div>
