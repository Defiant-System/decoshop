<div class="dialog-box" data-dlg="dlgCurves">
	<div class="dlg-content">
		<div class="fields">
			<h2>
				<i class="icon-dlg-close" data-click="dlg-close"></i>
				Curves
			</h2>

			<div class="field-row">
				<div class="option select" data-options="fieldset-inline-menubox" data-match="//CurvesPresets">
					<span class="label">Preset</span>
					<span class="value">Custom</span>
				</div>
			</div>

			<div class="field-row">
				<div class="option select" data-options="fieldset-inline-menubox" data-match="//LevelChannels">
					<span class="label">Channel</span>
					<span class="value">RGB</span>
				</div>
			</div>

			<div class="field-row has-graph">
				<div class="option-bar">
					<i class="tool-ns-resize"></i>
					<i class="tool-spline"></i>
					<i class="tool-sketch"></i>

					<i class="tool-pipette-dark"></i>
					<i class="tool-pipette-mid"></i>
					<i class="tool-pipette-light"></i>
				</div>
				<div class="graph">
					<div class="range-h"></div>
					<div class="range-v"></div>
				</div>
			</div>

		</div>
		<div class="buttons">
			<div class="button" data-click="dlg-ok">OK</div>
			<div class="button" data-click="dlg-reset">Reset</div>
			<div class="toggler" data-value="on" data-click="dlg-preview">
				<span>Preview</span>
			</div>
		</div>
	</div>
</div>
