<div class="dialog-box" data-dlg="dlgReplaceColor">
	<div class="dlg-content">
		<div class="fields">
			<h2>
				<i class="icon-dlg-close" data-click="dlg-close"></i>
				Replace Color
			</h2>

			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Fuzziness</span>
					<span class="value"><input type="text" name="fuzziness" data-min="0" data-max="100" value="55" data-default="55"></span>
				</div>
				<div class="knob" data-change="set-fuzziness"></div>
			</div>

			<div class="field-row has-preset">
				<div class="option">
					<span class="label">Color</span>
					<span class="color-preset pull inline-menu" style="background: #f00;" data-options="swatches" data-match="//Swatches"></span>
					<span class="tool-pipette"></span>
				</div>
			</div>

			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Hue</span>
					<span class="value"><input type="text" name="hue" data-min="-180" data-max="180" value="-22" data-default="-22"></span>
				</div>
				<div class="pan-knob" data-change="set-hue"></div>
			</div>

			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Saturation</span>
					<span class="value"><input type="text" name="saturation" data-min="-100" data-max="100" value="0" data-default="0"></span>
				</div>
				<div class="pan-knob" data-change="set-saturation"></div>
			</div>

			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Lightness</span>
					<span class="value"><input type="text" name="lightness" data-min="-100" data-max="100" value="0" data-default="0"></span>
				</div>
				<div class="pan-knob" data-change="set-lightness"></div>
			</div>

		</div>
		<div class="buttons">
			<div class="button" data-click="dlg-ok">OK</div>
			<div class="button" data-click="dlg-reset">Reset</div>
			<div class="toggler" data-value="on" data-click="dlg-preview">
				<span>Preview</span>
			</div>
		</div>
	</div>
</div>
