<div class="dialog-box" data-dlg="dlgLevels">
	<div class="dlg-content">
		<div class="fields">
			<h2>
				<i class="icon-dlg-close" data-click="dlg-close"></i>
				Levels
			</h2>

			<div class="field-row">
				<div class="option select" data-options="fieldset-inline-menubox" data-match="//LevelChannels">
					<span class="label">Channel</span>
					<span class="value">RGB</span>
				</div>
			</div>

			<div class="field-row has-graph has-range">
				<div class="option input">
					<span class="label">Input Levels</span>
					<span class="value">
						<i class="icon-1"></i>
						<i class="icon-2"></i>
						<i class="icon-3"></i>
						<span data-id="input-1">0</span>
						<span data-id="input-2">0</span>
						<span data-id="input-3">0</span>
					</span>
				</div>
				<div class="graph"></div>
				<div class="slider-handles" style="--v1: 0px; --v2: 149px; --v3: 299px;">
					<span class="handle" data-for="input-1"></span>
					<span class="handle" data-for="input-2"></span>
					<span class="handle" data-for="input-3"></span>
				</div>
			</div>
			
			<div class="field-row has-range has-input">
				<div class="option input">
					<span class="label">Output Levels</span>
					<span class="value">
						<span data-id="output-1">0</span>
						<span data-id="output-2">0</span>
					</span>
				</div>
				<div class="slider" data-range="lightness" style="--v1: 0px; --v2: 299px;">
					<span class="handle" data-for="output-1"></span>
					<span class="handle" data-for="output-2"></span>
				</div>
			</div>

		</div>
		<div class="buttons">
			<div class="button" data-click="dlg-ok">OK</div>
			<div class="button" data-click="dlg-reset">Reset</div>
			<div class="toggler" data-value="on" data-click="dlg-preview">
				<span>Preview</span>
			</div>
		</div>
	</div>
</div>
