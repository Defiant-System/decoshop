<div class="dialog-box" data-dlg="dlgLevels">
	<div class="dlg-content">
		<div class="fields">
			<h2>
				<i class="icon-dlg-close" data-click="dlg-close"></i>
				Levels
			</h2>

			<div class="field-row">
				<div class="option select" data-change="set-channel" data-name="channel" data-options="fieldset-inline-menubox" data-match="//LevelChannels">
					<span class="label">Channel</span>
					<span class="value" data-default="RGB">RGB</span>
					<!-- <span class="button">Auto</span> -->
				</div>
			</div>

			<div class="field-row">
				<div class="option select" data-change="set-algorithm" data-name="algorithm" data-options="fieldset-inline-menubox" data-match="//LevelAlgorithms">
					<span class="label">Algorithm</span>
					<span class="value" data-default="None">None</span>
				</div>
			</div>

			<div class="field-row has-graph has-range">
				<div class="option input">
					<span class="label">Input Levels</span>
					<span class="value">
						<i class="icon-1"></i>
						<i class="icon-2"></i>
						<i class="icon-3"></i>
						<span data-id="input-shadows">
							<input type="text" value="0"/>
						</span>
						<span data-id="input-midtones">
							<input type="text" value="1.0"/>
						</span>
						<span data-id="input-highlights">
							<input type="text" value="255"/>
						</span>
					</span>
				</div>
				<div class="graph levels">
					<canvas></canvas>
				</div>
				<div class="slider" data-range="input">
					<span class="handle" data-for="input-shadows" style="left: 0px;"></span>
					<span class="handle" data-for="input-midtones" style="left: 149px;"></span>
					<span class="handle" data-for="input-highlights" style="left: 299px;"></span>
				</div>
			</div>
			
			<div class="field-row has-range has-input">
				<div class="option input">
					<span class="label">Output Levels</span>
					<span class="value">
						<span data-id="output-shadows">
							<input type="number" value="0"/>
						</span>
						<span data-id="output-highlights">
							<input type="number" value="255"/>
						</span>
					</span>
				</div>
				<div class="slider" data-range="output">
					<span class="handle" data-for="output-shadows" style="left: 0px;"></span>
					<span class="handle" data-for="output-highlights" style="left: 299px;"></span>
				</div>
			</div>

		</div>
		<div class="buttons">
			<div class="button" data-click="dlg-ok">OK</div>
			<div class="button" data-click="dlg-reset">Reset</div>
			<div class="toggler" data-value="on" data-click="dlg-preview">
				<span>Preview</span>
			</div>
		</div>
	</div>
</div>
