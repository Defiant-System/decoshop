<div class="dialog-box" data-dlg="dlgChannelMixer">
	<div class="dlg-content">
		<div class="fields">
			<h2>
				<i class="icon-dlg-close" data-click="dlg-close"></i>
				Channel Mixer
			</h2>

			<div class="field-row">
				<div class="option opt-group">
					<span class="label">Channel</span>
					<span class="value">
						<ul class="opt-group" data-default="red" data-name="input" data-click="set-input">
							<li data-value="red" class="active">Red</li>
							<li data-value="green">Green</li>
							<li data-value="blue">Blue</li>
							<li data-value="gray">Monochromatic</li>
						</ul>
					</span>
				</div>
			</div>

			<div class="field-row has-basic-range">
				<div class="option input">
					<span class="label">Red</span>
					<span class="value">
						<span data-id="channel-red" data-suffix="%">0%</span>
					</span>
				</div>
				<div class="slider" data-min="-200" data-max="200" data-change="set-red-output" data-target="channel-red" data-ux="br-track" data-range="range-red">
					<span class="handle" data-ux="br-handle"></span>
				</div>
			</div>

			<div class="field-row has-basic-range">
				<div class="option input">
					<span class="label">Green</span>
					<span class="value">
						<span data-id="channel-green" data-suffix="%">0%</span>
					</span>
				</div>
				<div class="slider" data-min="-200" data-max="200" data-change="set-green-output" data-target="channel-green" data-ux="br-track" data-range="range-green">
					<span class="handle" data-ux="br-handle"></span>
				</div>
			</div>

			<div class="field-row has-basic-range">
				<div class="option input">
					<span class="label">Blue</span>
					<span class="value">
						<span data-id="channel-blue" data-suffix="%">0%</span>
					</span>
				</div>
				<div class="slider" data-min="-200" data-max="200" data-change="set-blue-output" data-target="channel-blue" data-ux="br-track" data-range="range-blue">
					<span class="handle" data-ux="br-handle"></span>
				</div>
			</div>

			<div class="field-row has-basic-range">
				<div class="option input">
					<span class="label">Total</span>
					<span class="value">
						<span data-id="channel-total" data-suffix="%">0%</span>
					</span>
				</div>
				<div class="slider" data-min="-200" data-max="200" data-change="set-total-output" data-target="channel-total" data-ux="br-track" data-range="range-total">
					<span class="handle" data-ux="br-handle"></span>
				</div>
			</div>
			
		</div>
		<div class="buttons">
			<div class="button" data-click="dlg-ok">OK</div>
			<div class="button" data-click="dlg-reset">Reset</div>
			<div class="toggler" data-value="on" data-click="dlg-preview">
				<span>Preview</span>
			</div>
		</div>
	</div>
</div>
