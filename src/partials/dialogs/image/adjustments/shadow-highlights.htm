<div class="dialog-box" data-dlg="dlgShadowHighlights">
	<div class="dlg-content">
		<div class="fields">
			<h2>
				<i class="icon-dlg-close" data-click="dlg-close"></i>
				Shadows / Highlights
			</h2>

			<h3>Shadows</h3>

			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Amount</span>
					<span class="value"><input type="text" name="amount" data-min="0" data-max="100" value="50%" data-default="50%" data-suffix="%"></span>
				</div>
				<div class="knob" data-value="50"></div>
			</div>

			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Tone</span>
					<span class="value"><input type="text" name="amount" data-min="0" data-max="100" value="25%" data-default="25%" data-suffix="%"></span>
				</div>
				<div class="knob" data-value="25"></div>
			</div>

			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Amount</span>
					<span class="value"><input type="text" name="amount" data-min="0" data-max="200" value="12px" data-default="12px" data-suffix="px"></span>
				</div>
				<div class="knob" data-value="12"></div>
			</div>

			<h3>Highlights</h3>

			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Amount</span>
					<span class="value"><input type="text" name="amount" data-min="0" data-max="100" value="50%" data-default="50%" data-suffix="%"></span>
				</div>
				<div class="knob" data-value="50"></div>
			</div>

			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Tone</span>
					<span class="value"><input type="text" name="amount" data-min="0" data-max="100" value="25%" data-default="25%" data-suffix="%"></span>
				</div>
				<div class="knob" data-value="25"></div>
			</div>

			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Amount</span>
					<span class="value"><input type="text" name="amount" data-min="0" data-max="200" value="12px" data-default="12px" data-suffix="px"></span>
				</div>
				<div class="knob" data-value="12"></div>
			</div>

			<h3>Adjustments</h3>

			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Color</span>
					<span class="value"><input type="text" name="amount" data-min="-100" data-max="100" value="0" data-default="0"></span>
				</div>
				<div class="pan-knob" data-value="0"></div>
			</div>
			
		</div>
		<div class="buttons">
			<div class="button" data-click="dlg-ok">OK</div>
			<div class="button" data-click="dlg-reset">Reset</div>
			<div class="toggler" data-value="on" data-click="dlg-preview">
				<span>Preview</span>
			</div>
		</div>
	</div>
</div>
