<div class="dialog-box" data-dlg="dlgMatchColor">
	<div class="dlg-content">
		<div class="fields">
			<h2>
				<i class="icon-dlg-close" data-click="dlg-close"></i>
				Match Color
			</h2>
			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Luminance</span>
					<span class="value"><input type="text" name="amount" data-min="1" data-max="200" value="100" data-default="100"></span>
				</div>
				<div class="knob" data-value="100"></div>
			</div>
			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Color Intensity</span>
					<span class="value"><input type="text" name="amount" data-min="1" data-max="200" value="100" data-default="100"></span>
				</div>
				<div class="knob" data-value="100"></div>
			</div>
			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Fade</span>
					<span class="value"><input type="text" name="amount" data-min="0" data-max="200" value="0%" data-default="0%" data-suffix="%"></span>
				</div>
				<div class="knob" data-value="0"></div>
			</div>
			<div class="field-row">
				<div class="option">
					<span class="label"></span>
					<div class="toggler" data-value="off">
						<span>Neutralize</span>
					</div>
				</div>
			</div>

			<div class="field-row">
				<div class="option select" data-options="fieldset-inline-menubox" data-match="//CustomMenu">
					<span class="label">Source</span>
					<span class="value">None</span>
				</div>
			</div>

			<div class="field-row">
				<div class="option select" data-options="fieldset-inline-menubox" data-match="//CustomMenu">
					<span class="label">Label</span>
					<span class="value">Copy Merged</span>
				</div>
			</div>
		</div>
		<div class="buttons">
			<div class="button" data-click="dlg-ok">OK</div>
			<div class="button" data-click="dlg-reset">Reset</div>
			<div class="toggler" data-value="on" data-click="dlg-preview">
				<span>Preview</span>
			</div>
		</div>
	</div>
</div>
