<div class="dialog-box" data-dlg="dlgVibrance">
	<div class="dlg-content">
		<div class="fields">
			<h2>
				<i class="icon-dlg-close" data-click="dlg-close"></i>
				Vibrance
			</h2>

			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Vibrance</span>
					<span class="value">
						<input type="text" name="vibrance" data-min="-100" data-max="100" value="0" data-default="0"/>
					</span>
				</div>
				<div class="pan-knob" data-change="set-vibrance"></div>
			</div>

			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Saturation</span>
					<span class="value">
						<input type="text" name="saturation" data-min="-100" data-max="100" value="0" data-default="0"/>
					</span>
				</div>
				<div class="pan-knob" data-change="set-saturation"></div>
			</div>
		</div>
		<div class="buttons">
			<div class="button" data-click="dlg-ok">OK</div>
			<div class="button" data-click="dlg-reset">Reset</div>
			<div class="toggler" data-value="on" data-click="dlg-preview">
				<span>Preview</span>
			</div>
		</div>
	</div>
</div>
