<div class="dialog-box" data-dlg="dlgHueSaturation">
	<div class="dlg-content">
		<div class="fields">
			<h2>
				<i class="icon-dlg-close" data-click="dlg-close"></i>
				Hue / Saturation
			</h2>

			<!-- <div class="field-row has-option-tool">
				<div class="option select" data-change="set-color-range" data-options="fieldset-inline-menubox" data-match="//HSRanges">
					<span class="label">
						Range
						<div class="toggle-tool" data-click="toggle-image-saturation" title="Change saturation in image."></div>
					</span>
					<span class="value">Master</span>
				</div>
			</div> -->

			<div class="field-row has-option-tool">
				<div class="option opt-colors">
					<span class="label">
						Range
					</span>
					<span class="value">
						<ul class="color-group">
							<li class="master active"></li>
							<li class="red"></li>
							<li class="yellow"></li>
							<li class="green"></li>
							<li class="cyan"></li>
							<li class="blue"></li>
							<li class="magenta"></li>
						</ul>
						<div class="toggle-tool" data-click="toggle-image-saturation" title="Change saturation in image."></div>
					</span>
				</div>
			</div>

			<div class="field-row has-basic-range">
				<div class="option input">
					<span class="label">Hue</span>
					<span class="value">
						<span data-id="hue-value">0</span>
					</span>
				</div>
				<div class="slider" data-min="-180" data-max="180" data-change="set-hue-value" data-target="hue-value" data-ux="br-track" data-range="hue">
					<span class="handle" data-ux="br-handle"></span>
				</div>
			</div>

			<div class="field-row has-basic-range">
				<div class="option input">
					<span class="label">Saturation</span>
					<span class="value">
						<span data-id="saturation-value">0</span>
					</span>
				</div>
				<div class="slider" data-min="-100" data-max="100" data-change="set-saturation-value" data-target="saturation-value" data-ux="br-track" data-range="saturation">
					<span class="handle" data-ux="br-handle"></span>
				</div>
			</div>

			<div class="field-row has-basic-range">
				<div class="option input">
					<span class="label">Lightness</span>
					<span class="value">
						<span data-id="lightness-value">0</span>
					</span>
				</div>
				<div class="slider" data-min="-100" data-max="100" data-change="set-lightness-value" data-target="lightness-value" data-ux="br-track" data-range="lightness">
					<span class="handle" data-ux="br-handle"></span>
				</div>
			</div>

			<div class="field-row has-ranges-tools"> <!-- show -->
				<div class="range-values-left">
					<span data-id="range-low-min">315°</span> /
					<span data-id="range-low-mid-min">345°</span>
				</div>
				<div class="range-values-right">
					<span data-id="range-high-mid-max">15°</span> \
					<span data-id="range-high-max">45°</span>
				</div>
				<span class="tool-items" data-click="reset-pipette">
					<span class="item-pipette" data-click="set-pipette" data-arg="1"></span>
					<span class="item-pipette-plus" data-click="set-pipette" data-arg="2"></span>
					<span class="item-pipette-minus" data-click="set-pipette" data-arg="3"></span>
				</span>
			</div>

			<div class="field-row has-sliders-only"> <!-- show -->
				<div class="q-slider">
					<span class="handle" data-ux="qr-handle">
						<span class="min" data-ux="qr-min" data-for="range-low-min"></span>
						<span class="mid-handle" data-ux="qrm-handle">
							<span class="min" data-ux="qrm-min" data-for="range-low-mid-min"></span>
							<span class="max" data-ux="qrm-max" data-for="range-high-mid-max"></span>
						</span>
						<span class="max" data-ux="qr-max" data-for="range-high-max"></span>
					</span>
				</div>
				<!-- <div class="slider no-drag"></div> -->
			</div>
			
		</div>
		<div class="buttons">
			<div class="button" data-click="dlg-ok">OK</div>
			<div class="button" data-click="dlg-reset">Reset</div>
			<div class="toggler" data-value="off" data-name="colorize" data-default="off" data-click="toggle-colorize">
				<span>Colorize</span>
			</div>
			<div class="toggler" data-value="on" data-click="dlg-preview">
				<span>Preview</span>
			</div>
		</div>
	</div>
</div>
