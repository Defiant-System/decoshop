<div class="dialog-box" data-dlg="dlgColorLookup">
	<div class="dlg-content">
		<div class="fields">
			<h2>
				<i class="icon-dlg-close" data-click="dlg-close"></i>
				Color Look Up
			</h2>
			
			<div class="field-row">
				<div class="option select" data-change="set-lut" data-name="lut" data-options="fieldset-inline-menubox" data-match="//ColorLookUpTables">
					<span class="label">LUTs</span>
					<span class="value" data-default="None">None</span>
				</div>
			</div>
		</div>
		<div class="buttons">
			<div class="button" data-click="dlg-ok">OK</div>
			<div class="button" data-click="dlg-reset">Reset</div>
			<div class="toggler" data-value="on" data-click="dlg-preview">
				<span>Preview</span>
			</div>
		</div>
	</div>
</div>
