<div class="dialog-box" data-dlg="dlgPosterize">
	<div class="dlg-content">
		<div class="fields">
			<h2>
				<i class="icon-dlg-close" data-click="dlg-close"></i>
				Posterize
			</h2>
			
			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Levels</span>
					<span class="value"><input type="text" name="levels" data-min="2" data-max="48" value="3" data-default="3"></span>
				</div>
				<div class="knob" data-change="set-levels" data-value="3"></div>
			</div>

		</div>
		<div class="buttons">
			<div class="button" data-click="dlg-ok">OK</div>
			<div class="button" data-click="dlg-reset">Reset</div>
			<div class="toggler" data-value="on" data-click="dlg-preview">
				<span>Preview</span>
			</div>
		</div>
	</div>
</div>
