<div class="dialog-box" data-dlg="dlgToolShape">
	<div class="dlg-content">
		<div class="fields push-rows">
			<h2>
				<i class="icon-dlg-close" data-click="dlg-close"></i>
				New <span class="type">Rectangle</span>
			</h2>

			<div class="field-row">
				<div class="option select" data-options="fieldset-inline-menubox" data-match="//Units">
					<span class="label">Units</span>
					<span class="value">Pixels</span>
				</div>
			</div>
			
			<div class="linked-2">
				<i class="icon-linked" data-click="toggle-ratio-linked"></i>
			</div>
			
			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">
						Width
						<i class="icon-switch-values"></i>
					</span>
					<span class="value">
						<input type="text" name="artboard-width" data-min="1" data-max="999" value="100px" data-default="100px" data-suffix="px"/>
					</span>
				</div>
				<div class="knob" data-change="set-artboard-width" data-value="100"></div>
			</div>
			
			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Height</span>
					<span class="value">
						<input type="text" name="artboard-height" data-min="1" data-max="999" value="100px" data-default="100px" data-suffix="px"/>
					</span>
				</div>
				<div class="knob" data-change="set-artboard-height" data-value="100"></div>
			</div>

			<div class="field-row">
				<div class="option">
					<span class="label">From</span>
					<div class="toggler" data-value="on">
						<span>Center</span>
					</div>
				</div>
			</div>
		</div>
		<div class="buttons">
			<div class="button" data-click="dlg-ok">OK</div>
		</div>
	</div>
</div>
