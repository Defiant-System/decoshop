<div class="dialog-box" data-dlg="dlgLayerStyle">
	<div class="dlg-content">
		<div class="fields">
			<h2>
				<i class="icon-dlg-close" data-click="dlg-close"></i>
				Layer Style
			</h2>
			<div class="options">
				<div class="blend-list">
					<div class="option selected">Blending Options</div>
					<div class="option check">
						<span class="value">
							<input type="checkbox" id="check-1">
							<i></i>
						</span>
						<label class="label" for="check-1">Bevel &amp; Emboss</label>
					</div>
					<div class="option check push selected">
						<span class="value">
							<input type="checkbox" id="check-2">
							<i></i>
						</span>
						<label class="label" for="check-2">Contour</label>
					</div>
					<div class="option check push">
						<span class="value">
							<input type="checkbox" id="check-3">
							<i></i>
						</span>
						<label class="label" for="check-3">Texture</label>
					</div>
					<div class="option check">
						<span class="value">
							<input type="checkbox" id="check-4">
							<i></i>
						</span>
						<label class="label" for="check-4">Stroke</label>
					</div>
					<div class="option check">
						<span class="value">
							<input type="checkbox" id="check-5">
							<i></i>
						</span>
						<label class="label" for="check-5">Inner Shadow</label>
					</div>
					<div class="option check">
						<span class="value">
							<input type="checkbox" id="check-6">
							<i></i>
						</span>
						<label class="label" for="check-6">Inner Glow</label>
					</div>
					<div class="option check selected">
						<span class="value">
							<input type="checkbox" id="check-7">
							<i></i>
						</span>
						<label class="label" for="check-7">Satin</label>
					</div>
					<div class="option check">
						<span class="value">
							<input type="checkbox" id="check-8">
							<i></i>
						</span>
						<label class="label" for="check-8">Color Overlay</label>
					</div>
					<div class="option check">
						<span class="value">
							<input type="checkbox" id="check-9">
							<i></i>
						</span>
						<label class="label" for="check-9">Gradient Overlay</label>
					</div>
					<div class="option check">
						<span class="value">
							<input type="checkbox" id="check-10">
							<i></i>
						</span>
						<label class="label" for="check-10">Pattern Overlay</label>
					</div>
					<div class="option check">
						<span class="value">
							<input type="checkbox" id="check-11">
							<i></i>
						</span>
						<label class="label" for="check-11">Outer Glow</label>
					</div>
					<div class="option check">
						<span class="value">
							<input type="checkbox" id="check-12">
							<i></i>
						</span>
						<label class="label" for="check-12">Drop Shadow</label>
					</div>
				</div>
				<div class="blend-details">
					
				</div>
			</div>
		</div>
		<div class="buttons">
			<div class="button" data-click="dlg-ok">OK</div>
			<div class="button" data-click="define-new">Define New</div>
			<div class="toggler" data-value="on" data-click="dlg-preview">
				<span>Preview</span>
			</div>
		</div>
	</div>
</div>
