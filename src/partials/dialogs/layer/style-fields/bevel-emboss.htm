
<div class="style-fields" data-name="Bevel Emboss">
	<h3>Bevel &amp; Emboss</h3>

	<fieldset>
		<h4>Structure</h4>
		<div class="field-row">
			<div class="option select">
				<span class="label">Style</span>
				<span class="value">Inner Bevel</span>
			</div>
		</div>
		<div class="field-row">
			<div class="option select">
				<span class="label">Technique</span>
				<span class="value">Smooth</span>
			</div>
		</div>
		<div class="field-row has-knob">
			<div class="option input">
				<span class="label">Depth</span>
				<span class="value">
					<input type="text" name="field-1" data-min="0" data-max="1000" value="157%" data-suffix="%"/>
				</span>
			</div>
			<div class="knob" data-change="set-filter-value" data-value="157"></div>
		</div>
		<div class="field-row has-knob">
			<div class="option input">
				<span class="label">Size</span>
				<span class="value">
					<input type="text" name="field-2" data-min="0" data-max="200" value="5px" data-suffix="px"/>
				</span>
			</div>
			<div class="knob" data-change="set-filter-value" data-value="5"></div>
		</div>
		<div class="field-row has-knob">
			<div class="option input">
				<span class="label">Soften</span>
				<span class="value">
					<input type="text" name="field-3" data-min="0" data-max="20" value="0px" data-suffix="px"/>
				</span>
			</div>
			<div class="knob" data-change="set-filter-value" data-value="0"></div>
		</div>
	</fieldset>

	<fieldset>
		<h4>Shading</h4>
	</fieldset>
</div>
