
<div class="style-fields" data-name="Bevel Emboss">
	<h3>Bevel &amp; Emboss</h3>

	<fieldset>
		<h4>Structure</h4>
		<div class="field-row">
			<div class="option select">
				<span class="label">Style</span>
				<span class="value">Inner Bevel</span>
			</div>
		</div>
		<div class="field-row">
			<div class="option select">
				<span class="label">Technique</span>
				<span class="value">Smooth</span>
			</div>
		</div>
		<div class="field-row">
			<div class="option opt-group">
				<span class="label">Direction</span>
				<span class="value">
					<ul class="opt-group">
						<li data-id="dir-up" class="active">Up</li>
						<li data-id="dir-down">Down</li>
					</ul>
				</span>
			</div>
		</div>
		<div class="field-row has-knob">
			<div class="option input">
				<span class="label">Depth</span>
				<span class="value">
					<input type="text" name="field-1" data-min="0" data-max="1000" value="157%" data-suffix="%"/>
				</span>
			</div>
			<div class="knob" data-value="157"></div>
		</div>
		<div class="field-row has-knob">
			<div class="option input">
				<span class="label">Size</span>
				<span class="value">
					<input type="text" name="field-2" data-min="0" data-max="200" value="5px" data-suffix="px"/>
				</span>
			</div>
			<div class="knob" data-value="5"></div>
		</div>
		<div class="field-row has-knob">
			<div class="option input">
				<span class="label">Soften</span>
				<span class="value">
					<input type="text" name="field-3" data-min="0" data-max="20" value="0px" data-suffix="px"/>
				</span>
			</div>
			<div class="knob" data-value="0"></div>
		</div>
	</fieldset>

	<fieldset>
		<h4>Shading</h4>

		<div class="field-row slim-row has-knob">
			<div class="option input has-ring push-value">
				<span class="label">Angle</span>
				<span class="value">
					<div class="ring-input size-3"></div>
					<input type="text" name="field-4" data-min="-180" data-max="180" value="30°" data-suffix="°"/>
				</span>
			</div>
			<div class="pan-knob" data-value="30"></div>
		</div>

		<div class="field-row slim-row">
			<div class="option has-toggler push-value">
				<span class="label"></span>
				<span class="value">
					<div class="toggler" data-value="on">
						<span>Global Light</span>
					</div>
				</span>
			</div>
		</div>

		<div class="field-row slim-row has-knob">
			<div class="option input push-value">
				<span class="label">Altitude</span>
				<span class="value">
					<input type="text" name="field-5" data-min="-180" data-max="180" value="30°" data-suffix="°"/>
				</span>
			</div>
			<div class="pan-knob" data-value="30"></div>
		</div>

		<div class="field-row has-preview-box">
			<div class="option select">
				<span class="label">Gloss Contour</span>
				<span class="preview-box" data-click="open-dialog" data-arg="dlgContourEditor">
					<i class="contour-preview"></i>
				</span>
				<span class="value" data-options="contours" data-match="//Countours">
					<span>Rolling Slope - Descending</span>
				</span>
			</div>
		</div>
		<div class="field-row has-preset">
			<div class="option select">
				<span class="label">Highlight Mode</span>
				<span class="value">Screen</span>
				<span class="color-preset inline-menu" style="background: #f00;" data-options="swatches" data-match="//Swatches"></span>
			</div>
		</div>
		<div class="field-row has-knob">
			<div class="option input">
				<span class="label">Opacity</span>
				<span class="value">
					<input type="text" name="field-3" data-min="0" data-max="100" value="50%" data-suffix="%"/>
				</span>
			</div>
			<div class="knob" data-value="50"></div>
		</div>
		<div class="field-row has-preset">
			<div class="option select">
				<span class="label">Shadow Mode</span>
				<span class="value">Multiply</span>
				<span class="color-preset inline-menu" style="background: #393;" data-options="swatches" data-match="//Swatches"></span>
			</div>
		</div>
		<div class="field-row has-knob">
			<div class="option input">
				<span class="label">Opacity</span>
				<span class="value">
					<input type="text" name="field-3" data-min="0" data-max="100" value="50%" data-suffix="%"/>
				</span>
			</div>
			<div class="knob" data-value="50"></div>
		</div>
	</fieldset>
</div>
