
<div class="style-fields" data-name="Inner Shadow">
	<h3>Inner Shadow</h3>

	<fieldset>
		<h4>Structure</h4>

		<div class="field-row has-preset">
			<div class="option select">
				<span class="label">Blend Mode</span>
				<span class="value">Screen</span>
				<span class="color-preset inline-menu" style="background: #333;" data-options="swatches" data-match="//Swatches"></span>
			</div>
		</div>

		<div class="field-row has-knob">
			<div class="option input">
				<span class="label">Opacity</span>
				<span class="value">
					<input type="text" name="opacity" data-min="1" data-max="100" value="100%" data-suffix="%"/>
				</span>
			</div>
			<div class="knob" data-change="set-opacity"></div>
		</div>

		<div class="field-row slim-row has-knob">
			<div class="option input has-ring push-value">
				<span class="label">Angle</span>
				<span class="value">
					<div class="ring-input" data-ux="ring-input" data-change="set-angle"></div>
					<input type="text" name="angle" data-min="-180" data-max="180" value="135°" data-suffix="°"/>
				</span>
				<div class="pan-knob" data-change="set-angle"></div>
			</div>
		</div>

		<div class="field-row slim-row">
			<div class="option has-toggler push-value">
				<span class="label"></span>
				<span class="value">
					<div class="toggler" data-value="on" data-name="global-light" data-default="on" data-click="toggle-global-light">
						<span>Global Light</span>
					</div>
				</span>
			</div>
		</div>

		<div class="field-row has-knob">
			<div class="option input">
				<span class="label">Distance</span>
				<span class="value">
					<input type="text" name="distance" data-min="0" data-max="100" value="8px" data-suffix="px"/>
				</span>
			</div>
			<div class="knob" data-change="set-distance"></div>
		</div>

		<div class="field-row has-knob">
			<div class="option input">
				<span class="label">Spread</span>
				<span class="value">
					<input type="text" name="spread" data-min="0" data-max="100" value="0%" data-suffix="%"/>
				</span>
			</div>
			<div class="knob" data-change="set-spread"></div>
		</div>

		<div class="field-row has-knob">
			<div class="option input">
				<span class="label">Size</span>
				<span class="value">
					<input type="text" name="size" data-min="0" data-max="100" value="21px" data-suffix="px"/>
				</span>
			</div>
			<div class="knob" data-change="set-size"></div>
		</div>
	</fieldset>

	<fieldset>
		<h4>Quality</h4>

		<div class="field-row has-preview-box">
			<div class="option select">
				<span class="label">Contour</span>
				<span class="preview-box" data-click="open-dialog" data-arg="dlgContourEditor">
					<i class="contour-preview"></i>
				</span>
				<span class="value" data-options="contours" data-match="//Contours">
					<span>Rolling Slope - Descending</span>
				</span>
			</div>
		</div>

		<div class="field-row has-knob">
			<div class="option input">
				<span class="label">Noise</span>
				<span class="value">
					<input type="text" name="noise" data-min="0" data-max="100" value="0%" data-suffix="%"/>
				</span>
			</div>
			<div class="knob" data-change="set-noise"></div>
		</div>
	</fieldset>
</div>
