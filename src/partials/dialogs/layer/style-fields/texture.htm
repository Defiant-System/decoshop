
<div class="style-fields" data-name="Texture">
	<h3>Texture</h3>

	<fieldset>
		<h4>Elements</h4>

		<div class="field-row has-preview-box">
			<div class="option select">
				<span class="label">Pattern</span>
				<span class="preview-box" data-click="open-dialog" data-arg="dlgContourEditor">
					<i class="contour-preview"></i>
				</span>
				<span class="value" data-options="contours" data-match="//Contours">
					<span>Some Pattern</span>
				</span>
			</div>
		</div>

		<div class="field-row has-knob">
			<div class="option input">
				<span class="label">Scale</span>
				<span class="value">
					<input type="text" name="scale" data-min="1" data-max="400" value="100%" data-suffix="%"/>
				</span>
			</div>
			<div class="knob" data-change="set-scale"></div>
		</div>

		<div class="field-row has-knob">
			<div class="option input">
				<span class="label">Depth</span>
				<span class="value">
					<input type="text" name="depth" data-min="-300" data-max="300" value="100%" data-suffix="%"/>
				</span>
			</div>
			<div class="pan-knob" data-change="set-depth"></div>
		</div>

		<div class="field-row">
			<div class="option has-toggler">
				<span class="label"></span>
				<span class="value">
					<div class="toggler" data-value="off" data-name="invert" data-default="off" data-click="toggle-invert">
						<span>Invert</span>
					</div>
					<div class="toggler" data-value="on" data-name="layer-linked" data-default="on" data-click="toggle-layer-linked">
						<span>Layer Linked</span>
					</div>
				</span>
			</div>
		</div>

		<div class="field-row has-knob">
			<div class="option input">
				<span class="label">Off X</span>
				<span class="value">
					<input type="text" name="offx" data-min="-100" data-max="100" value="0px" data-suffix="px"/>
				</span>
			</div>
			<div class="pan-knob" data-change="set-offx"></div>
		</div>

		<div class="field-row has-knob">
			<div class="option input">
				<span class="label">Off Y</span>
				<span class="value">
					<input type="text" name="offy" data-min="-100" data-max="100" value="0px" data-suffix="px"/>
				</span>
			</div>
			<div class="pan-knob" data-change="set-offy"></div>
		</div>
	</fieldset>
</div>
