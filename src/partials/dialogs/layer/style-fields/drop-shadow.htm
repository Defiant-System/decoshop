
<div class="style-fields" data-name="Drop Shadow">
	<h3>Drop Shadow</h3>

	<fieldset>
		<h4>Structure</h4>

		<div class="field-row has-preset">
			<div class="option select" data-options="fieldset-inline-menubox" data-match="//BlendModes">
				<span class="label">Blend Mode</span>
				<span class="value">Screen</span>
				<span class="color-preset inline-menu" style="background: #333;" data-options="swatches" data-match="//Swatches"></span>
			</div>
		</div>

		<div class="field-row has-knob">
			<div class="option input">
				<span class="label">Opacity</span>
				<span class="value">
					<input type="text" name="field-1" data-min="1" data-max="100" value="75%" data-suffix="%"/>
				</span>
			</div>
			<div class="knob" data-value="75"></div>
		</div>

		<div class="field-row slim-row has-knob">
			<div class="option input has-ring push-value">
				<span class="label">Angle</span>
				<span class="value">
					<div class="ring-input"></div>
					<input type="text" name="field-4" data-min="-180" data-max="180" value="135°" data-suffix="°"/>
				</span>
				<div class="knob" data-value="135"></div>
			</div>
		</div>

		<div class="field-row slim-row">
			<div class="option has-toggler push-value">
				<span class="label"></span>
				<span class="value">
					<div class="toggler" data-value="on">
						<span>Global Light</span>
					</div>
				</span>
			</div>
		</div>

		<div class="field-row has-knob">
			<div class="option input">
				<span class="label">Distance</span>
				<span class="value">
					<input type="text" name="field-1" data-min="0" data-max="100" value="8px" data-suffix="px"/>
				</span>
			</div>
			<div class="knob" data-value="8"></div>
		</div>

		<div class="field-row has-knob">
			<div class="option input">
				<span class="label">Spread</span>
				<span class="value">
					<input type="text" name="field-1" data-min="0" data-max="100" value="0%" data-suffix="%"/>
				</span>
			</div>
			<div class="knob" data-value="0"></div>
		</div>

		<div class="field-row has-knob">
			<div class="option input">
				<span class="label">Size</span>
				<span class="value">
					<input type="text" name="field-1" data-min="0" data-max="100" value="21px" data-suffix="px"/>
				</span>
			</div>
			<div class="knob" data-value="21"></div>
		</div>
	</fieldset>

	<fieldset>
		<h4>Quality</h4>

		<div class="field-row has-preview-box">
			<div class="option select">
				<span class="label">Contour</span>
				<span class="preview-box" data-click="open-dialog" data-arg="dlgContourEditor">
					<i class="contour-preview"></i>
				</span>
				<span class="value" data-options="contours" data-match="//Countours">
					<span>Rolling Slope - Descending</span>
				</span>
			</div>
		</div>

		<div class="field-row has-knob">
			<div class="option input">
				<span class="label">Noise</span>
				<span class="value">
					<input type="text" name="field-1" data-min="1" data-max="100" value="0%" data-suffix="%"/>
				</span>
			</div>
			<div class="knob" data-change="set-filter-value" data-value="0"></div>
		</div>
	</fieldset>
</div>
