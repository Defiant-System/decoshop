<div class="dialog-box" data-dlg="dlgSelectModifyFeather">
	<div class="dlg-content">
		<div class="fields">
			<h2>
				<i class="icon-dlg-close" data-click="dlg-close"></i>
				Feather
			</h2>

			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Amount</span>
					<span class="value"><input type="text" name="amount" data-min="0" data-max="20" value="1px" data-default="1px" data-suffix="px"></span>
				</div>
				<div class="knob" data-value="1"></div>
			</div>

			<div class="field-row">
				<div class="option has-toggler">
					<span class="label">Canvas Bounds</span>
					<span class="value">
						<div class="toggler" data-value="off" data-name="apply" data-default="off" data-click="toggle-apply">
							<span>Apply</span>
						</div>
					</span>
				</div>
			</div>
		</div>
		<div class="buttons">
			<div class="button" data-click="dlg-ok">OK</div>
		</div>
	</div>
</div>
