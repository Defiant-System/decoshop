<div class="dialog-box" data-dlg="dlgExportAs">
	<div class="dlg-content">
		<div class="preview-box">
			<h2>
				<i class="icon-dlg-close" data-click="dlg-close"></i>
				Export As
			</h2>
			<div class="preview">
				<div class="zoom-level">
					<span data-click="preview-zoom-out"></span>
					<span class="preview-zoom-value">100%</span>
					<span data-click="preview-zoom-in"></span>
				</div>
			</div>
		</div>
		<div class="sidebar-options">
			<div class="options-wrapper">

				<div class="field-row">
					<div class="option select" data-options="fieldset-inline-menubox" data-match="//Units">
						<span class="label">Format</span>
						<span class="value">PNG</span>
					</div>
				</div>

				<div class="field-row">
					<div class="option select" data-options="fieldset-inline-menubox" data-match="//Units">
						<span class="label">Units</span>
						<span class="value">Pixels</span>
					</div>
				</div>
		
				<div class="linked-2">
					<i class="icon-linked" data-click="toggle-ratio-linked"></i>
				</div>
				
				<div class="field-row has-knob">
					<div class="option input">
						<span class="label">Width</span>
						<span class="value">
							<input type="text" name="canvas-width" data-min="1" data-max="999" value="100px" data-default="100px" data-suffix="px"/>
						</span>
					</div>
					<div class="knob" data-change="set-canvas-width" data-value="100"></div>
				</div>
				
				<div class="field-row has-knob">
					<div class="option input">
						<span class="label">Height</span>
						<span class="value">
							<input type="text" name="canvas-height" data-min="1" data-max="999" value="100px" data-default="100px" data-suffix="px"/>
						</span>
					</div>
					<div class="knob" data-change="set-canvas-height" data-value="100"></div>
				</div>

				<div data-format="png">
					<div class="field-row has-knob">
						<div class="option input">
							<span class="label">Quality</span>
							<span class="value">
								<input type="text" name="quality" data-min="0" data-max="100" value="70%" data-default="70%" data-suffix="%"/>
							</span>
						</div>
						<div class="knob" data-value="70"></div>
					</div>

					<div class="field-row">
						<div class="option has-toggler">
							<span class="label">Palettes</span>
							<span class="value">
								<div class="toggler" data-value="off">
									<span>Use</span>
								</div>
							</span>
						</div>
					</div>
				</div>
			</div>
			<div class="buttons">
				<div class="button" data-click="dlg-ok">OK</div>
			</div>
		</div>
	</div>
</div>
