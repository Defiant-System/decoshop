<div class="dialog-box" data-dlg="dlgFilterGallery">
	<div class="dlg-content">
		<h2>
			<i class="icon-dlg-close" data-click="dlg-close"></i>
			Filter Gallery
		</h2>
		
		<div class="layout">
			<div class="preview">
				<div class="zoom-level">
					<span data-click="preview-zoom-out"></span>
					<span class="preview-zoom-value">100%</span>
					<span data-click="preview-zoom-in"></span>
				</div>
			</div>
			<div class="active-filters">
				<!-- <div class="button" data-click="dlg-ok">OK</div> -->

				<div class="filter-row">
					<div class="filter-head">
						<span class="arrow" data-click="toggle-filter-row">
							<i class="icon-arrow"></i>
						</span>
						<span class="filter" data-filter="Colored Pencil" data-click="show-filter-options"></span>
						<span class="action-icons">
							<i class="icon-eye-on" data-click="toggle-filter"></i>
							<i class="icon-trashcan" data-click="remove-filter"></i>
						</span>
					</div>
					<div class="filter-body"></div>
				</div>

				<div class="filter-row expanded1">
					<div class="filter-head">
						<span class="arrow" data-click="toggle-filter-row">
							<i class="icon-arrow"></i>
						</span>
						<span class="filter" data-filter="Cutout" data-click="show-filter-options"></span>
						<span class="action-icons">
							<i class="icon-eye-off" data-click="toggle-filter"></i>
							<i class="icon-trashcan" data-click="remove-filter"></i>
						</span>
					</div>
					<div class="filter-body">
						<div class="field-row has-knob">
							<div class="option input">
								<span class="label">Stroke Width</span>
								<span class="value"><input type="text" name="size" value="1" data-min="5" data-max="70" data-default="1"></span>
							</div>
							<div class="knob" data-change="set-size"></div>
						</div>
						<div class="field-row has-knob">
							<div class="option input">
								<span class="label">Stroke Brightness</span>
								<span class="value"><input type="text" name="size" value="12" data-min="5" data-max="70" data-default="12"></span>
							</div>
							<div class="knob" data-change="set-size"></div>
						</div>
						<div class="field-row has-knob">
							<div class="option input">
								<span class="label">Stroke Smothness</span>
								<span class="value"><input type="text" name="size" value="23" data-min="5" data-max="70" data-default="23"></span>
							</div>
							<div class="knob" data-change="set-size"></div>
						</div>
					</div>
				</div>

				<div class="filter-row">
					<div class="filter-head">
						<span class="arrow" data-click="toggle-filter-row">
							<i class="icon-arrow"></i>
						</span>
						<span class="filter" data-filter="Halftone Pattern" data-click="show-filter-options"></span>
						<span class="action-icons">
							<i class="icon-eye-on" data-click="toggle-filter"></i>
							<i class="icon-trashcan" data-click="remove-filter"></i>
						</span>
					</div>
					<div class="filter-body">
						<div class="field-row has-knob">
							<div class="option input">
								<span class="label">Stroke Width</span>
								<span class="value"><input type="text" name="size" value="1" data-min="5" data-max="70" data-default="1"></span>
							</div>
							<div class="knob" data-change="set-size"></div>
						</div>
					</div>
				</div>

				<!-- add more filters -->
				<div class="add-filter" data-click="add-filter">
					<i class="icon-add-filter"></i>
					Add Filter
				</div>

			</div>
		</div>

		<div class="bubble-options">
			<div class="bubble-content" data-click="select-filter">
				<!-- filter gallery list goes here -->
			</div>
		</div>
	</div>
</div>
