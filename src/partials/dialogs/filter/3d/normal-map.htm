<div class="dialog-box" data-dlg="dlgNormalMap">
	<div class="dlg-content">
		<div class="fields">
			<h2>
				<i class="icon-dlg-close" data-click="dlg-close"></i>
				Normal Map
			</h2>

			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Blur</span>
					<span class="value">
						<input type="text" name="size" data-min="0" data-max="200" data-default="0px" value="0px" data-suffix="px">
					</span>
				</div>
				<div class="knob" data-change="set-size" data-value="0px"></div>
			</div>

			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Scale</span>
					<span class="value">
						<input type="text" name="field-1" data-min="0" data-max="200" value="100%" data-suffix="%"/>
					</span>
				</div>
				<div class="knob" data-value="100"></div>
			</div>

			<div class="field-row has-toggler">
				<div class="option">
					<span class="label"></span>
					<div class="toggler" data-value="off">
						<span>Invert</span>
					</div>
				</div>
			</div>

			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">High</span>
					<span class="value">
						<input type="text" name="field-1" data-min="0" data-max="100" value="100%" data-suffix="%"/>
					</span>
				</div>
				<div class="knob" data-value="100"></div>
			</div>

			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Medium</span>
					<span class="value">
						<input type="text" name="field-1" data-min="0" data-max="100" value="100%" data-suffix="%"/>
					</span>
				</div>
				<div class="knob" data-value="100"></div>
			</div>

			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Low</span>
					<span class="value">
						<input type="text" name="field-1" data-min="0" data-max="100" value="100%" data-suffix="%"/>
					</span>
				</div>
				<div class="knob" data-value="100"></div>
			</div>
			
		</div>
		<div class="buttons">
			<div class="button" data-click="dlg-ok">OK</div>
			<div class="button" data-click="dlg-reset">Reset</div>
			<div class="toggler" data-value="on" data-click="dlg-preview">
				<span>Preview</span>
			</div>
		</div>
	</div>
</div>
