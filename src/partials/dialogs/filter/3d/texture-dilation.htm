<div class="dialog-box" data-dlg="dlgTextureDilation">
	<div class="dlg-content">
		<div class="fields">
			<h2>
				<i class="icon-dlg-close" data-click="dlg-close"></i>
				Texture Dilation
			</h2>

			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Crop</span>
					<span class="value">
						<input type="text" name="crop" data-min="0" data-max="20" data-default="0px" value="0px" data-suffix="px">
					</span>
				</div>
				<div class="knob" data-change="set-crop"></div>
			</div>

			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Radius</span>
					<span class="value">
						<input type="text" name="radius" data-min="0" data-max="400" data-default="10px" value="10px" data-suffix="px">
					</span>
				</div>
				<div class="knob" data-change="set-radius"></div>
			</div>
		</div>
		<div class="buttons">
			<div class="button" data-click="dlg-ok">OK</div>
			<div class="button" data-click="dlg-reset">Reset</div>
			<div class="toggler" data-value="on" data-click="dlg-preview">
				<span>Preview</span>
			</div>
		</div>
	</div>
</div>
