<div class="dialog-box" data-dlg="dlgLensFlare">
	<div class="dlg-content">
		<div class="fields">
			<h2>
				<i class="icon-dlg-close" data-click="dlg-close"></i>
				Lens Flare
			</h2>

			<div class="sample-rect"></div>
			
			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Brightness</span>
					<span class="value"><input type="text" name="brightness" data-min="0" data-max="30" value="100%" data-default="100%" data-suffix="%"></span>
				</div>
				<div class="knob" data-change="set-brightness"></div>
			</div>

			<div class="field-row">
				<div class="option select" data-options="fieldset-inline-menubox" data-match="//LensFlareTypes">
					<span class="label">Lens Type</span>
					<span class="value">50-300mm Zoom</span>
				</div>
			</div>
		</div>
		<div class="buttons">
			<div class="button" data-click="dlg-ok">OK</div>
			<div class="button" data-click="dlg-reset">Reset</div>
			<div class="toggler" data-value="on" data-click="dlg-preview">
				<span>Preview</span>
			</div>
		</div>
	</div>
</div>
