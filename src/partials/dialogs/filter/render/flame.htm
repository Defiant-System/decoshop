<div class="dialog-box" data-dlg="dlgFlame">
	<div class="dlg-content">
		<div class="fields">
			<h2>
				<i class="icon-dlg-close" data-click="dlg-close"></i>
				Flame
			</h2>
			
			<div class="field-row">
				<div class="option select" data-options="fieldset-inline-menubox" data-match="//FlameTypes">
					<span class="label">Type</span>
					<span class="value">One Flame Along Path</span>
				</div>
			</div>

			<div class="field-row">
				<div class="option has-toggler">
					<span class="label">Length</span>
					<div class="toggler" data-value="on">
						<span>Randomize</span>
					</div>
				</div>
			</div>

			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Length</span>
					<span class="value">
						<input type="text" data-min="20" data-max="1000" value="140px" data-default="140px" data-suffix="px"/>
					</span>
				</div>
				<div class="knob" data-value="140"></div>
			</div>

			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Width</span>
					<span class="value">
						<input type="text" data-min="5" data-max="600" value="100px" data-default="100px" data-suffix="px"/>
					</span>
				</div>
				<div class="knob" data-value="100"></div>
			</div>

			<div class="field-row slim-row has-knob">
				<div class="option input has-ring push-value">
					<span class="label">Angle</span>
					<span class="value">
						<div class="ring-input"></div>
						<input type="text" data-min="-180" data-max="180" value="0°" data-suffix="°"/>
					</span>
					<div class="pan-knob" data-value="0"></div>
				</div>
			</div>

		</div>
		<div class="buttons">
			<div class="button" data-click="dlg-ok">OK</div>
		</div>
	</div>
</div>
