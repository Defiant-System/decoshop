<div class="dialog-box" data-dlg="dlgFlame">
	<div class="dlg-content">
		<div class="fields" data-show="advanced">
			<h2>
				<i class="icon-dlg-close" data-click="dlg-close"></i>
				Flame
			</h2>

			<div class="field-row">
				<div class="option opt-group">
					<span class="label">Style</span>
					<span class="value">
						<ul class="opt-group" data-click="select-style">
							<li data-id="basic" class="active">Basic</li>
							<li data-id="advanced">Advanced</li>
						</ul>
					</span>
				</div>
			</div>
			
			<div data-fields="basic">
				<div class="field-row">
					<div class="option select" data-options="fieldset-inline-menubox" data-match="//FlameTypes">
						<span class="label">Type</span>
						<span class="value">One Flame Along Path</span>
					</div>
				</div>

				<div class="field-row">
					<div class="option has-toggler">
						<span class="label">Length</span>
						<div class="toggler" data-value="off" data-name="length" data-default="off" data-click="toggle-length">
							<span>Randomize</span>
						</div>
					</div>
				</div>

				<div class="field-row has-knob">
					<div class="option input">
						<span class="label">Length</span>
						<span class="value">
							<input type="text" name="length" data-min="20" data-max="1000" value="140px" data-default="140px" data-suffix="px"/>
						</span>
					</div>
					<div class="knob" data-change="set-length"></div>
				</div>

				<div class="field-row has-knob">
					<div class="option input">
						<span class="label">Width</span>
						<span class="value">
							<input type="text" name="width" data-min="5" data-max="600" value="100px" data-default="100px" data-suffix="px"/>
						</span>
					</div>
					<div class="knob" data-change="set-width"></div>
				</div>

				<div class="field-row fat-ring-row has-knob">
					<div class="option input has-ring push-value">
						<span class="label">Angle</span>
						<span class="value">
							<div class="ring-input"></div>
							<input type="text" name="name" data-min="-180" data-max="180" value="0°" data-suffix="°"/>
						</span>
						<div class="knob" data-change="set-angle"></div>
					</div>
				</div>

				<div class="field-row has-knob">
					<div class="option input">
						<span class="label">Interval</span>
						<span class="value">
							<input type="text" name="interval" data-min="5" data-max="200" value="100px" data-default="100px" data-suffix="px"/>
						</span>
					</div>
					<div class="knob" data-change="set-interval"></div>
				</div>

				<div class="field-row">
					<div class="option has-toggler">
						<span class="label">Loop Intervals</span>
						<div class="toggler" data-value="off" data-name="adapt" data-default="off" data-click="toggle-adapt">
							<span>Adapt</span>
						</div>
					</div>
				</div>

				<div class="field-row has-preset">
					<div class="option select" data-options="fieldset-inline-menubox" data-match="//FlameQuality">
						<span class="label">Quality</span>
						<span class="value">2: Low</span>
						<span class="color-preset inline-menu" style="--c: #ff6e1c;" data-options="swatches" data-match="//Swatches"></span>
					</div>
				</div>
			</div>

			<div class="hidden" data-fields="advanced">
				<div class="field-row has-knob">
					<div class="option input">
						<span class="label">Turbulent</span>
						<span class="value">
							<input type="text" name="turbulent" data-min="0" data-max="100" value="50" data-default="50"/>
						</span>
					</div>
					<div class="knob" data-change="set-turbulent"></div>
				</div>

				<div class="field-row has-knob">
					<div class="option input">
						<span class="label">Jag</span>
						<span class="value">
							<input type="text" name="jag" data-min="0" data-max="100" value="0" data-default="0"/>
						</span>
					</div>
					<div class="knob" data-change="set-jag"></div>
				</div>

				<div class="field-row has-knob">
					<div class="option input">
						<span class="label">Opacity</span>
						<span class="value">
							<input type="text" name="opacity" data-min="0" data-max="100" value="25" data-default="25"/>
						</span>
					</div>
					<div class="knob" data-change="set-opacity"></div>
				</div>

				<div class="field-row has-knob">
					<div class="option input">
						<span class="label">Lines</span>
						<span class="value">
							<input type="text" name="lines" data-min="2" data-max="30" value="10" data-default="10"/>
						</span>
					</div>
					<div class="knob" data-change="set-lines"></div>
				</div>

				<div class="field-row has-knob">
					<div class="option input">
						<span class="label">Bottom</span>
						<span class="value">
							<input type="text" name="bottom" data-min="0" data-max="100" value="30" data-default="30"/>
						</span>
					</div>
					<div class="knob" data-change="set-bottom"></div>
				</div>

				<div class="field-row">
					<div class="option select" data-options="fieldset-inline-menubox" data-match="//FlameStyles">
						<span class="label">Style</span>
						<span class="value">Normal</span>
					</div>
				</div>

				<div class="field-row has-toggler">
					<div class="option select" data-options="fieldset-inline-menubox" data-match="//FlameShapes">
						<span class="label">Shape</span>
						<span class="value">Parallel</span>
						<div class="toggler" data-value="off" data-name="randomize" data-default="off" data-click="toggle-randomize">
							<span>Randomize</span>
						</div>
					</div>
				</div>

				<div class="field-row has-knob">
					<div class="option input">
						<span class="label">Seed</span>
						<span class="value">
							<input type="text" name="seed" data-min="0" data-max="100" value="18" data-default="18"/>
						</span>
					</div>
					<div class="knob" data-change="set-seed"></div>
				</div>
			</div>

		</div>
		<div class="buttons">
			<div class="button" data-click="dlg-ok">OK</div>
			<div class="button" data-click="dlg-reset">Reset</div>
			<div class="toggler" data-value="on" data-click="dlg-preview">
				<span>Preview</span>
			</div>
		</div>
	</div>
</div>
