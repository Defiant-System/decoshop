<div class="dialog-box" data-dlg="dlgFibers">
	<div class="dlg-content">
		<div class="fields">
			<h2>
				<i class="icon-dlg-close" data-click="dlg-close"></i>
				Fibers
			</h2>
			
			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Variance</span>
					<span class="value"><input type="text" name="variance" data-min="0" data-max="10" value="10" data-default="10"></span>
				</div>
				<div class="knob" data-change="set-variance"></div>
			</div>
			
			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Strength</span>
					<span class="value"><input type="text" name="strength" data-min="0" data-max="100" value="1" data-default="1"></span>
				</div>
				<div class="knob" data-change="set-strength"></div>
			</div>
			
			<div class="field-row has-button">
				<div class="option input">
					<span class="label">Seed</span>
					<span class="value">
						<div class="button">Randomize</div>
					</span>
				</div>
			</div>
		</div>
		<div class="buttons">
			<div class="button" data-click="dlg-ok">OK</div>
			<div class="button" data-click="dlg-reset">Reset</div>
			<div class="toggler" data-value="on" data-click="dlg-preview">
				<span>Preview</span>
			</div>
		</div>
	</div>
</div>
