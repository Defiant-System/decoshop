<div class="dialog-box" data-dlg="dlgRipple">
	<div class="dlg-content">
		<div class="fields">
			<h2>
				<i class="icon-dlg-close" data-click="dlg-close"></i>
				Ripple
			</h2>
			
			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Amount</span>
					<span class="value"><input type="text" name="amount" data-min="-999" data-max="999" value="2" data-default="2"</span>
				</div>
				<div class="pan-knob" data-change="set-amount"></div>
			</div>

			<div class="field-row">
				<div class="option opt-group">
					<span class="label">Size</span>
					<span class="value">
						<ul class="opt-group">
							<li data-value="0">Small</li>
							<li data-value="1" class="active">Medium</li>
							<li data-value="2">Large</li>
						</ul>
					</span>
				</div>
			</div>
		</div>
		<div class="buttons">
			<div class="button" data-click="dlg-ok">OK</div>
			<div class="button" data-click="dlg-reset">Reset</div>
			<div class="toggler" data-value="on" data-click="dlg-preview">
				<span>Preview</span>
			</div>
		</div>
	</div>
</div>
