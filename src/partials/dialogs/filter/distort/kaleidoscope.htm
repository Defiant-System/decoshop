<div class="dialog-box" data-dlg="dlgKaleidoscope">
	<div class="dlg-content">
		<div class="fields">
			<h2>
				<i class="icon-dlg-close" data-click="dlg-close"></i>
				Kaleidoscope
			</h2>
			
			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Mirrors</span>
					<span class="value"><input type="text" name="mirrors" data-min="2" data-max="20" value="6" data-default="6"</span>
				</div>
				<div class="knob" data-change="set-mirrors"></div>
			</div>

			<div class="field-row fat-ring-row has-knob">
				<div class="option input has-ring push-value">
					<span class="label">Angle</span>
					<span class="value">
						<div class="ring-input"></div>
						<input type="text" name="angle" data-min="0" data-max="360" value="0°" data-suffix="°"/>
					</span>
					<div class="knob" data-change="set-angle"></div>
				</div>
			</div>

		</div>
		<div class="buttons">
			<div class="button" data-click="dlg-ok">OK</div>
			<div class="button" data-click="dlg-reset">Reset</div>
			<div class="toggler" data-value="on" data-click="dlg-preview">
				<span>Preview</span>
			</div>
		</div>
	</div>
</div>
