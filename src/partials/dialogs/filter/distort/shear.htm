<div class="dialog-box" data-dlg="dlgShear">
	<div class="dlg-content">
		<div class="fields">
			<h2>
				<i class="icon-dlg-close" data-click="dlg-close"></i>
				Shear
			</h2>
			
			<div class="graph"></div>

			<div class="field-row half-half">
				<div class="option input">
					<span class="label">In (X)</span>
					<span class="value">
						<input type="text" name="field-1" data-min="0" data-max="1000" value="51%" data-suffix="%"/>
					</span>
				</div>
				<div class="option input">
					<span class="label">Out (Y)</span>
					<span class="value">
						<input type="text" name="field-2" data-min="0" data-max="1000" value="67%" data-suffix="%"/>
					</span>
				</div>
			</div>
			
			<div class="field-row long-label">
				<div class="option opt-group">
					<span class="label">Undefined Area</span>
					<span class="value">
						<ul class="opt-group">
							<li data-value="0" class="active">Wrap Around</li>
							<li data-valie="1">Repeat Edge</li>
						</ul>
					</span>
				</div>
			</div>

		</div>
		<div class="buttons">
			<div class="button" data-click="dlg-ok">OK</div>
			<div class="button" data-click="dlg-reset">Reset</div>
			<div class="toggler" data-value="on" data-click="dlg-preview">
				<span>Preview</span>
			</div>
		</div>
	</div>
</div>
