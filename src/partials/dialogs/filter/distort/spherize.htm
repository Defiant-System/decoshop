<div class="dialog-box" data-dlg="dlgSpherize">
	<div class="dlg-content">
		<div class="fields">
			<h2>
				<i class="icon-dlg-close" data-click="dlg-close"></i>
				Spherize
			</h2>

			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Amount</span>
					<span class="value">
						<input type="text" name="amount" data-min="-100" data-max="100" data-default="0" value="0"/>
					</span>
				</div>
				<div class="pan-knob" data-change="set-amount"></div>
			</div>
			
			<div class="field-row">
				<div class="option opt-group">
					<span class="label">Mode</span>
					<span class="value">
						<ul class="opt-group" data-default="Nrml" data-name="mode" data-click="set-mode">
							<li data-value="Nrml" class="active">Normal</li>
							<li data-value="HrzO">Horizontal</li>
							<li data-value="VrtO">Vertical</li>
						</ul>
					</span>
				</div>
			</div>
			
			<div class="sphere-cvs">
				<canvas></canvas>
			</div>

		</div>
		<div class="buttons">
			<div class="button" data-click="dlg-ok">OK</div>
			<div class="button" data-click="dlg-reset">Reset</div>
			<div class="toggler" data-value="on" data-click="dlg-preview">
				<span>Preview</span>
			</div>
		</div>
	</div>
</div>
