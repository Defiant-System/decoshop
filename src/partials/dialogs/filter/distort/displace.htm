<div class="dialog-box" data-dlg="dlgDisplace">
	<div class="dlg-content">
		<div class="fields">
			<h2>
				<i class="icon-dlg-close" data-click="dlg-close"></i>
				Displace
			</h2>

			<div class="field-row">
				<div class="option select">
					<span class="label">Source</span>
					<span class="value">Background.psd</span>
				</div>
			</div>
			
			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Horizontal</span>
					<span class="value"><input type="text" name="horizontal" data-min="-100" data-max="100" value="0px" data-default="0px" data-suffix="px"></span>
				</div>
				<div class="knob" data-change="set-horizontal"></div>
			</div>
			
			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Vertical</span>
					<span class="value"><input type="text" name="vertical" data-min="-100" data-max="100" value="0px" data-default="0px" data-suffix="px"></span>
				</div>
				<div class="knob" data-change="set-vertical"></div>
			</div>

			<div class="field-row">
				<div class="option opt-group">
					<span class="label">Undefined Area</span>
					<span class="value">
						<ul class="opt-group">
							<li class="active">Wrap Around</li>
							<li>Repeat Edge</li>
						</ul>
					</span>
				</div>
			</div>
		</div>
		<div class="buttons">
			<div class="button" data-click="dlg-ok">OK</div>
			<div class="button" data-click="dlg-reset">Reset</div>
			<div class="toggler" data-value="on" data-click="dlg-preview">
				<span>Preview</span>
			</div>
		</div>
	</div>
</div>
