<div class="dialog-box" data-dlg="dlgPolarCoordinates">
	<div class="dlg-content">
		<div class="fields">
			<h2>
				<i class="icon-dlg-close" data-click="dlg-close"></i>
				Polar Coordinates
			</h2>

			<div class="field-row">
				<div class="option opt-group">
					<span class="label">Coordinates</span>
					<span class="value">
						<ul class="opt-group" data-default="RctP" data-name="coordinates" data-click="set-coordinates">
							<li data-value="RctP" class="active">Rect to Polar</li>
							<li data-value="PlrR">Polar to Rect</li>
						</ul>
					</span>
				</div>
			</div>
		</div>
		<div class="buttons">
			<div class="button" data-click="dlg-ok">OK</div>
			<div class="button" data-click="dlg-reset">Reset</div>
			<div class="toggler" data-value="on" data-click="dlg-preview">
				<span>Preview</span>
			</div>
		</div>
	</div>
</div>
