<div class="dialog-box" data-dlg="dlgTraceContour">
	<div class="dlg-content">
		<div class="fields">
			<h2>
				<i class="icon-dlg-close" data-click="dlg-close"></i>
				Trace Contour
			</h2>

			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Level</span>
					<span class="value">
						<input type="text" name="level" data-min="0" data-max="200" value="143" data-default="143"/>
					</span>
				</div>
				<div class="knob" data-change="set-level"></div>
			</div>

			<div class="field-row">
				<div class="option opt-group">
					<span class="label">Edge</span>
					<span class="value">
						<ul class="opt-group">
							<li class="active">Down</li>
							<li>Up</li>
						</ul>
					</span>
				</div>
			</div>
		</div>
		<div class="buttons">
			<div class="button" data-click="dlg-ok">OK</div>
			<div class="button" data-click="dlg-reset">Reset</div>
			<div class="toggler" data-value="on" data-click="dlg-preview">
				<span>Preview</span>
			</div>
		</div>
	</div>
</div>
