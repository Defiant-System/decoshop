<div class="dialog-box" data-dlg="dlgWind">
	<div class="dlg-content">
		<div class="fields">
			<h2>
				<i class="icon-dlg-close" data-click="dlg-close"></i>
				Wind
			</h2>

			<div class="field-row">
				<div class="option opt-group">
					<span class="label">Technique</span>
					<span class="value">
						<ul class="opt-group">
							<li class="active">Wind</li>
							<li>Blast</li>
							<li>Stagger</li>
						</ul>
					</span>
				</div>
			</div>

			<div class="field-row">
				<div class="option opt-group">
					<span class="label">Direction</span>
					<span class="value">
						<ul class="opt-group">
							<li class="active">From the Right</li>
							<li>From the Left</li>
						</ul>
					</span>
				</div>
			</div>
		</div>
		<div class="buttons">
			<div class="button" data-click="dlg-ok">OK</div>
			<div class="button" data-click="dlg-reset">Reset</div>
			<div class="toggler" data-value="on" data-click="dlg-preview">
				<span>Preview</span>
			</div>
		</div>
	</div>
</div>
