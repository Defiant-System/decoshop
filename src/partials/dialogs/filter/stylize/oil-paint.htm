<div class="dialog-box" data-dlg="dlgOilPaint">
	<div class="dlg-content">
		<div class="fields">
			<h2>
				<i class="icon-dlg-close" data-click="dlg-close"></i>
				Oil Paint
			</h2>

			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Radius</span>
					<span class="value">
						<input type="text" name="field-1" data-min="0" data-max="400" value="3px" data-default="3px" data-suffix="px"/>
					</span>
				</div>
				<div class="knob" data-value="3"></div>
			</div>

			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Cleanliness</span>
					<span class="value">
						<input type="text" name="field-1" data-min="0" data-max="400" value="2px" data-default="2px" data-suffix="px"/>
					</span>
				</div>
				<div class="knob" data-value="2"></div>
			</div>

			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Scale</span>
					<span class="value">
						<input type="text" name="field-1" data-min="0" data-max="10" value="1" data-default="1"/>
					</span>
				</div>
				<div class="knob" data-value="1"></div>
			</div>

			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Bristle Detail</span>
					<span class="value">
						<input type="text" name="field-1" data-min="0" data-max="10" value="0" data-default="0"/>
					</span>
				</div>
				<div class="knob" data-value="0"></div>
			</div>

			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Shine</span>
					<span class="value">
						<input type="text" name="field-1" data-min="0" data-max="10" value="1" data-default="1"/>
					</span>
				</div>
				<div class="knob" data-value="1"></div>
			</div>

			<div class="field-row slim-row has-knob">
				<div class="option input has-ring push-value">
					<span class="label">Angle</span>
					<span class="value">
						<div class="ring-input"></div>
						<input type="text" name="field-4" data-min="-180" data-max="180" value="0°" data-suffix="°"/>
					</span>
					<div class="knob" data-value="0"></div>
				</div>
			</div>

			<div class="field-row slim-row">
				<div class="option has-toggler push-value">
					<span class="label"></span>
					<span class="value">
						<div class="toggler" data-value="on" data-name="lighting" data-default="on" data-click="toggle-lighting">
							<span>Lighting</span>
						</div>
					</span>
				</div>
			</div>
		</div>
		<div class="buttons">
			<div class="button" data-click="dlg-ok">OK</div>
		</div>
	</div>
</div>
