<div class="dialog-box" data-dlg="dlgEmboss">
	<div class="dlg-content">
		<div class="fields">
			<h2>
				<i class="icon-dlg-close" data-click="dlg-close"></i>
				Emboss
			</h2>

			<div class="field-row fat-ring-row has-knob">
				<div class="option input has-ring push-value">
					<span class="label">Angle</span>
					<span class="value">
						<div class="ring-input" data-ux="ring-input" data-change="set-angle"></div>
						<input type="text" name="angle" data-min="-180" data-max="180" value="45°" data-default="45°" data-suffix="°"/>
					</span>
					<div class="pan-knob" data-change="set-angle"></div>
				</div>
			</div>
			
			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Height</span>
					<span class="value"><input type="text" name="height" data-min="1" data-max="100" value="4px" data-default="4px" data-suffix="px"></span>
				</div>
				<div class="knob" data-change="set-height"></div>
			</div>

			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Amount</span>
					<span class="value">
						<input type="text" name="amount" data-min="0" data-max="500" value="100%" data-default="100%" data-suffix="%"/>
					</span>
				</div>
				<div class="knob" data-change="set-amount"></div>
			</div>
			
		</div>
		<div class="buttons">
			<div class="button" data-click="dlg-ok">OK</div>
			<div class="button" data-click="dlg-reset">Reset</div>
			<div class="toggler" data-value="on" data-click="dlg-preview">
				<span>Preview</span>
			</div>
		</div>
	</div>
</div>
