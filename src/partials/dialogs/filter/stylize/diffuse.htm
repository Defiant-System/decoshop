<div class="dialog-box" data-dlg="dlgDiffuse">
	<div class="dlg-content">
		<div class="fields">
			<h2>
				<i class="icon-dlg-close" data-click="dlg-close"></i>
				Diffuse
			</h2>
			
			<div class="field-row">
				<div class="option select" data-change="set-mode" data-name="mode" data-options="fieldset-inline-menubox" data-match="//DiffuseModes">
					<span class="label">Mode</span>
					<span class="value">Normal</span>
				</div>
			</div>
		</div>
		<div class="buttons">
			<div class="button" data-click="dlg-ok">OK</div>
			<div class="button" data-click="dlg-reset">Reset</div>
			<div class="toggler" data-value="on" data-click="dlg-preview">
				<span>Preview</span>
			</div>
		</div>
	</div>
</div>
