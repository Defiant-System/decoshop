<div class="dialog-box" data-dlg="dlgReduceNoise">
	<div class="dlg-content">
		<div class="fields">
			<h2>
				<i class="icon-dlg-close" data-click="dlg-close"></i>
				Reduce Noise
			</h2>
			
			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Strength</span>
					<span class="value"><input type="text" name="strength" data-min="0" data-max="10" value="5" data-default="5"></span>
				</div>
				<div class="knob" data-change="set-strength"></div>
			</div>
			
			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Protect Detail</span>
					<span class="value"><input type="text" name="detail" data-min="0" data-max="100" value="0%" data-default="0%" data-suffix="%"></span>
				</div>
				<div class="knob" data-change="set-detail"></div>
			</div>
		</div>
		<div class="buttons">
			<div class="button" data-click="dlg-ok">OK</div>
			<div class="button" data-click="dlg-reset">Reset</div>
			<div class="toggler" data-value="on" data-click="dlg-preview">
				<span>Preview</span>
			</div>
		</div>
	</div>
</div>
