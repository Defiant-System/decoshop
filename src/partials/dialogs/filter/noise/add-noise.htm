<div class="dialog-box" data-dlg="dlgAddNoise">
	<div class="dlg-content">
		<div class="fields">
			<h2>
				<i class="icon-dlg-close" data-click="dlg-close"></i>
				Add Noise
			</h2>

			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Amount</span>
					<span class="value">
						<input type="text" name="field-1" data-min="0" data-max="200" value="10%" data-default="10%" data-suffix="%"/>
					</span>
				</div>
				<div class="knob" data-value="10"></div>
			</div>

			<div class="field-row">
				<div class="option opt-group">
					<span class="label">Distribution</span>
					<span class="value">
						<ul class="opt-group">
							<li data-value="0">Gausian</li>
							<li data-value="1" class="active">Uniform</li>
						</ul>
					</span>
				</div>
			</div>
			
			<div class="field-row has-toggler">
				<div class="option">
					<span class="label">Monochromatic</span>
					<div class="toggler" data-value="off">
						<span>Apply</span>
					</div>
				</div>
			</div>
		</div>
		<div class="buttons">
			<div class="button" data-click="dlg-ok">OK</div>
			<div class="button" data-click="dlg-reset">Reset</div>
			<div class="toggler" data-value="on" data-click="dlg-preview">
				<span>Preview</span>
			</div>
		</div>
	</div>
</div>
