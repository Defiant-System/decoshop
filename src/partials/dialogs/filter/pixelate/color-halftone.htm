<div class="dialog-box" data-dlg="dlgColorHalftone">
	<div class="dlg-content">
		<div class="fields">
			<h2>
				<i class="icon-dlg-close" data-click="dlg-close"></i>
				Color Halftone
			</h2>

			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Radius</span>
					<span class="value"><input type="text" name="radius" data-min="4" data-max="100" value="8px" data-default="8px" data-suffix="px"></span>
				</div>
				<div class="knob" data-change="set-radius"></div>
			</div>

			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Angle 1</span>
					<span class="value"><input type="text" name="angle-1" data-min="0" data-max="90" value="10°" data-default="10°" data-suffix="°"></span>
				</div>
				<div class="knob" data-change="set-angle-1"></div>
			</div>

			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Angle 2</span>
					<span class="value"><input type="text" name="angle-2" data-min="0" data-max="90" value="40°" data-default="40°" data-suffix="°"></span>
				</div>
				<div class="knob" data-change="set-angle-2"></div>
			</div>

			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Angle 3</span>
					<span class="value"><input type="text" name="angle-3" data-min="0" data-max="90" value="70°" data-default="70°" data-suffix="°"></span>
				</div>
				<div class="knob" data-change="set-angle-3"></div>
			</div>
		</div>
		<div class="buttons">
			<div class="button" data-click="dlg-ok">OK</div>
			<div class="button" data-click="dlg-reset">Reset</div>
			<div class="toggler" data-value="on" data-click="dlg-preview">
				<span>Preview</span>
			</div>
		</div>
	</div>
</div>
