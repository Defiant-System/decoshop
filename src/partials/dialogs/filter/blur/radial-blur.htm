<div class="dialog-box" data-dlg="dlgRadialBlur">
	<div class="dlg-content">
		<div class="fields">
			<h2>
				<i class="icon-dlg-close" data-click="dlg-close"></i>
				Radial Blur
			</h2>

			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Amount</span>
					<span class="value">
						<input type="text" name="amount" data-min="1" data-max="100" value="10" data-default="10"/>
					</span>
				</div>
				<div class="knob" data-change="set-amount"></div>
			</div>

			<div class="field-row">
				<div class="option opt-group">
					<span class="label">Mode</span>
					<span class="value">
						<ul class="opt-group" data-default="Spn" data-name="mode" data-click="set-mode">
							<li data-value="Spn" class="active">Spin</li>
							<li data-value="Zm">Zoom</li>
						</ul>
					</span>
				</div>
			</div>

			<div class="blur-cvs">
				<canvas></canvas>
			</div>

		</div>
		<div class="buttons">
			<div class="button" data-click="dlg-ok">OK</div>
			<div class="button" data-click="dlg-reset">Reset</div>
			<div class="toggler" data-value="on" data-click="dlg-preview">
				<span>Preview</span>
			</div>
		</div>
	</div>
</div>
