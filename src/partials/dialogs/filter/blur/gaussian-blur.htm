<div class="dialog-box" data-dlg="dlgGaussianBlur">
	<div class="dlg-content">
		<div class="fields">
			<h2>
				<i class="icon-dlg-close" data-click="dlg-close"></i>
				Gaussian Blur
			</h2>
			
			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Radius</span>
					<!-- -->
					<span class="value"><input type="text" name="radius" data-min="0" data-max="50" value="0px" data-default="0px" data-suffix="px"></span>
					
					<!-- 
					<span class="value"><input type="text" name="radius" data-scale="[[0, 10, .1], [10, 100, 1]]" value="0px" data-default="0px" data-suffix="px"></span>
					-->
				</div>
				<div class="knob" data-change="set-radius" data-value="0"></div>
			</div>

		</div>
		<div class="buttons">
			<div class="button" data-click="dlg-ok">OK</div>
			<div class="button" data-click="dlg-reset">Reset</div>
			<div class="toggler" data-value="on" data-click="dlg-preview">
				<span>Preview</span>
			</div>
		</div>
	</div>
</div>
