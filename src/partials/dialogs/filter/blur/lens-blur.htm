<div class="dialog-box" data-dlg="dlgLensBlur">
	<div class="dlg-content">
		<div class="fields">
			<h2>
				<i class="icon-dlg-close" data-click="dlg-close"></i>
				Lens Blur
			</h2>
			
			<div class="field-row">
				<div class="option select" data-change="set-depth" data-name="depth" data-options="fieldset-inline-menubox" data-match="//LensBlurDepthMaps">
					<span class="label">Depth Map</span>
					<span class="value">None</span>
				</div>
			</div>

			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Focal Distance</span>
					<span class="value">
						<input type="text" name="focal" data-min="0" data-max="255" value="0" data-default="0"/>
					</span>
				</div>
				<div class="knob" data-change="set-focal"></div>
			</div>
			
			<div class="field-row">
				<div class="option select" data-change="set-shape" data-name="shape" data-options="fieldset-inline-menubox" data-match="//LensBlurShapes">
					<span class="label">Shape</span>
					<span class="value">Hexagon</span>
				</div>
			</div>
			
			<div class="field-row has-toggler">
				<div class="option">
					<span class="label"></span>
					<div class="toggler" data-value="off" data-name="invert" data-default="off" data-click="toggle-invert">
						<span>Invert</span>
					</div>
				</div>
			</div>

			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Radius</span>
					<span class="value">
						<input type="text" name="radius" data-min="0" data-max="100" value="30" data-default="30"/>
					</span>
				</div>
				<div class="knob" data-change="set-radius"></div>
			</div>

			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Angle</span>
					<span class="value">
						<input type="text" name="angle" data-min="0" data-max="360" value="0" data-default="0"/>
					</span>
				</div>
				<div class="knob" data-change="set-angle"></div>
			</div>

			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Brightness</span>
					<span class="value">
						<input type="text" name="brightness" data-min="0" data-max="100" value="0" data-default="0"/>
					</span>
				</div>
				<div class="knob" data-change="set-brightness"></div>
			</div>

			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Threshold</span>
					<span class="value">
						<input type="text" name="threshold" data-min="0" data-max="255" value="255" data-default="255"/>
					</span>
				</div>
				<div class="knob" data-change="set-threshold"></div>
			</div>

			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Noise</span>
					<span class="value">
						<input type="text" name="noise" data-min="0" data-max="100" value="0" data-default="0"/>
					</span>
				</div>
				<div class="knob" data-change="set-noise"></div>
			</div>


			<div class="field-row">
				<div class="option opt-group">
					<span class="label">Distribution</span>
					<span class="value">
						<ul class="opt-group" data-default="BeNu" data-name="distribution" data-click="set-distribution">
							<li data-value="BeNu" class="active">Uniform</li>
							<li data-value="BeNg">Gausian</li>
						</ul>
					</span>
				</div>
			</div>
			
			<div class="field-row has-toggler">
				<div class="option">
					<span class="label">Monochromatic</span>
					<div class="toggler" data-value="off" data-name="monochromatic" data-default="off" data-click="toggle-monochromatic">
						<span>Apply</span>
					</div>
				</div>
			</div>
		</div>
		<div class="buttons">
			<div class="button" data-click="dlg-ok">OK</div>
			<div class="button" data-click="dlg-reset">Reset</div>
			<div class="toggler" data-value="on" data-click="dlg-preview">
				<span>Preview</span>
			</div>
		</div>
	</div>
</div>
