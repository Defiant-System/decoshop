<div class="dialog-box" data-dlg="dlgSmartSharpen">
	<div class="dlg-content">
		<div class="fields">
			<h2>
				<i class="icon-dlg-close" data-click="dlg-close"></i>
				Smart Sharpen
			</h2>

			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Amount</span>
					<span class="value">
						<input type="text" name="amount" data-min="1" data-max="200" value="150%" data-default="150%" data-suffix="%"/>
					</span>
				</div>
				<div class="knob" data-change="set-amount"></div>
			</div>

			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Radius</span>
					<span class="value">
						<input type="text" name="radius" data-min="0" data-max="200" value="1px" data-default="1px" data-suffix="px"/>
					</span>
				</div>
				<div class="knob" data-change="set-radius"></div>
			</div>
			
		</div>
		<div class="buttons">
			<div class="button" data-click="dlg-ok">OK</div>
			<div class="button" data-click="dlg-reset">Reset</div>
			<div class="toggler" data-value="on" data-click="dlg-preview">
				<span>Preview</span>
			</div>
		</div>
	</div>
</div>
