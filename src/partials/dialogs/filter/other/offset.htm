<div class="dialog-box" data-dlg="dlgOffset">
	<div class="dlg-content">
		<div class="fields">
			<h2>
				<i class="icon-dlg-close" data-click="dlg-close"></i>
				Offset
			</h2>
			
			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Horizontal</span>
					<span class="value"><input type="text" name="horizontal" data-min="-1025" data-max="1025" value="0px" data-default="0px" data-suffix="px"></span>
				</div>
				<div class="pan-knob" data-change="set-horizontal"></div>
			</div>
			
			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Vertical</span>
					<span class="value"><input type="text" name="vertical" data-min="-1025" data-max="1025" value="0px" data-default="0px" data-suffix="px"></span>
				</div>
				<div class="pan-knob" data-change="set-vertical"></div>
			</div>

			<div class="field-row">
				<div class="option select" data-change="set-undefined" data-name="undefined" data-options="fieldset-inline-menubox" data-match="//UndefinedArea">
					<span class="label">Undefined Area</span>
					<span class="value" data-default="Wrap Around">Wrap Around</span>
				</div>
			</div>

		</div>
		<div class="buttons">
			<div class="button" data-click="dlg-ok">OK</div>
			<div class="button" data-click="dlg-reset">Reset</div>
			<div class="toggler" data-value="on" data-click="dlg-preview">
				<span>Preview</span>
			</div>
		</div>
	</div>
</div>
