<div class="dialog-box" data-dlg="dlgColorToAlpha">
	<div class="dlg-content">
		<div class="fields">
			<h2>
				<i class="icon-dlg-close" data-click="dlg-close"></i>
				Color To Alpha
			</h2>

			<div class="field-row has-preset">
				<div class="option">
					<span class="label">Color</span>
					<span class="color-preset inline-menu pull" style="background: #f00;" data-options="swatches" data-match="//Swatches"></span>
				</div>
			</div>

			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Transparency</span>
					<span class="value">
						<input type="text" name="field-1" data-min="0" data-max="100" value="0%" data-default="0%" data-suffix="%"/>
					</span>
				</div>
				<div class="knob" data-change="set-filter-value" data-value="0"></div>
			</div>

			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Opacity</span>
					<span class="value">
						<input type="text" name="field-1" data-min="0" data-max="100" value="30%" data-default="30%" data-suffix="%"/>
					</span>
				</div>
				<div class="knob" data-change="set-filter-value" data-value="30"></div>
			</div>

		</div>
		<div class="buttons">
			<div class="button" data-click="dlg-ok">OK</div>
			<div class="button" data-click="dlg-reset">Reset</div>
			<div class="toggler" data-value="on" data-click="dlg-preview">
				<span>Preview</span>
			</div>
		</div>
	</div>
</div>
