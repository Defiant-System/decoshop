<div class="dialog-box" data-dlg="dlgDither">
	<div class="dlg-content">
		<div class="fields">
			<h2>
				<i class="icon-dlg-close" data-click="dlg-close"></i>
				Dither
			</h2>

			<div class="field-row">
				<div class="option select" data-change="set-palette" data-name="palette" data-options="fieldset-inline-menubox" data-match="//DitherPalette">
					<span class="label">Palette</span>
					<span class="value" data-default="Black &amp; White">Black &amp; White</span>
				</div>
			</div>

			<div class="field-row tight">
				<div class="option opt-group">
					<span class="label">Channels</span>
					<span class="value">
						<ul class="opt-group" data-default="1" data-name="channels" data-click="set-channels">
							<li data-value="0">None</li>
							<li data-value="1" class="active">Floyd-Steinberg</li>
							<li data-value="2">Bayer 4x4</li>
						</ul>
					</span>
				</div>
			</div>
		</div>
		<div class="buttons">
			<div class="button" data-click="dlg-ok">OK</div>
			<div class="button" data-click="dlg-reset">Reset</div>
			<div class="toggler" data-value="on" data-click="dlg-preview">
				<span>Preview</span>
			</div>
		</div>
	</div>
</div>
