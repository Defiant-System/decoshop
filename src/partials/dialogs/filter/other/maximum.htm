<div class="dialog-box" data-dlg="dlgMaximum">
	<div class="dlg-content">
		<div class="fields">
			<h2>
				<i class="icon-dlg-close" data-click="dlg-close"></i>
				Maximum
			</h2>

			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Radius</span>
					<span class="value">
						<input type="text" name="radius" data-min="0" data-max="100" value="8px" data-default="8px" data-suffix="px"/>
					</span>
				</div>
				<div class="knob" data-change="set-radius"></div>
			</div>

			<div class="field-row">
				<div class="option opt-group">
					<span class="label">Shape</span>
					<span class="value">
						<ul class="opt-group" data-default="squareness" data-name="shape" data-click="set-shape">
							<li data-value="squareness" class="active">Square</li>
							<li data-value="Rndn">Circle</li>
						</ul>
					</span>
				</div>
			</div>
		</div>
		<div class="buttons">
			<div class="button" data-click="dlg-ok">OK</div>
			<div class="button" data-click="dlg-reset">Reset</div>
			<div class="toggler" data-value="on" data-click="dlg-preview">
				<span>Preview</span>
			</div>
		</div>
	</div>
</div>
