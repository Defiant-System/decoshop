<div class="dialog-box" data-dlg="dlgRepeat">
	<div class="dlg-content">
		<div class="fields">
			<h2>
				<i class="icon-dlg-close" data-click="dlg-close"></i>
				Repeat
			</h2>

			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Scale</span>
					<span class="value"><input type="text" name="scale" data-min="10" data-max="300" data-default="100%" value="100%" data-suffix="%"></span>
				</div>
				<div class="knob" data-change="set-scale"></div>
			</div>

			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Row Shift</span>
					<span class="value"><input type="text" name="shift" data-min="-50" data-max="50" value="0%" data-default="0%" data-suffix="%"></span>
				</div>
				<div class="pan-knob" data-change="set-shift"></div>
			</div>
			
			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Space X</span>
					<span class="value"><input type="text" name="spacex" data-min="-99" data-max="200" value="0%" data-default="0%" data-suffix="%"></span>
				</div>
				<div class="knob" data-change="set-spacex"></div>
			</div>
			
			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Space Y</span>
					<span class="value"><input type="text" name="spacey" data-min="-99" data-max="200" value="0%" data-default="0%" data-suffix="%"></span>
				</div>
				<div class="knob" data-change="set-spacey"></div>
			</div>

			<div class="field-row slim-row has-knob">
				<div class="option input has-ring push-value">
					<span class="label">Angle</span>
					<span class="value">
						<div class="ring-input" data-ux="ring-input" data-change="set-angle"></div>
						<input type="text" name="angle" data-min="-180" data-max="180" value="0°" data-suffix="°"/>
					</span>
					<div class="pan-knob" data-change="set-angle"></div>
				</div>
			</div>

			<div class="field-row slim-row">
				<div class="option has-toggler push-value">
					<span class="label"></span>
					<span class="value">
						<div class="toggler" data-value="on" data-name="auto-color" data-default="on" data-click="toggle-auto-color">
							<span>Auto Color</span>
						</div>
					</span>
				</div>
			</div>
		</div>
		<div class="buttons">
			<div class="button" data-click="dlg-ok">OK</div>
			<div class="button" data-click="dlg-reset">Reset</div>
			<div class="toggler" data-value="on" data-click="dlg-preview">
				<span>Preview</span>
			</div>
		</div>
	</div>
</div>
