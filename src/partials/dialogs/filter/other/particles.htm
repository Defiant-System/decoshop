<div class="dialog-box" data-dlg="dlgParticles">
	<div class="dlg-content">
		<div class="fields">
			<h2>
				<i class="icon-dlg-close" data-click="dlg-close"></i>
				Particles
			</h2>
			
			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Count</span>
					<span class="value"><input type="text" name="count" data-min="0" data-max="100" value="10%" data-default="10%" data-suffix="%"></span>
				</div>
				<div class="knob" data-change="set-count"></div>
			</div>
			
			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Size</span>
					<span class="value"><input type="text" name="size" data-min="0" data-max="50" value="8px" data-default="8px" data-suffix="px"></span>
				</div>
				<div class="knob" data-change="set-size"></div>
			</div>
			
			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Depth</span>
					<span class="value"><input type="text" name="depth" data-min="0" data-max="100" value="100%" data-default="100%" data-suffix="%"></span>
				</div>
				<div class="knob" data-change="set-depth"></div>
			</div>
			
			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Brightness</span>
					<span class="value"><input type="text" name="brightness" data-min="10" data-max="1000" value="800%" data-default="800%" data-suffix="%"></span>
				</div>
				<div class="knob" data-change="set-brightness"></div>
			</div>

			<div class="field-row has-preset">
				<div class="option">
					<span class="label">Color</span>
					<span class="color-preset inline-menu pull" style="background: #cccc00;" data-default="#cccc00" data-name="color" data-change="set-color" data-options="swatches" data-match="//Swatches"></span>
				</div>
			</div>
			
			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Time</span>
					<span class="value"><input type="text" name="time" data-min="0" data-max="1000" value="70%" data-default="70%" data-suffix="%"></span>
				</div>
				<div class="knob" data-change="set-time"></div>
			</div>
			
			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Turbulence</span>
					<span class="value"><input type="text" name="turbulance" data-min="0" data-max="100" value="0%" data-default="0%" data-suffix="%"></span>
				</div>
				<div class="knob" data-change="set-turbulance"></div>
			</div>

			<div class="field-row has-toggler">
				<div class="option input">
					<span class="label"></span>
					<div class="toggler" data-value="on" data-name="blink" data-default="on" data-click="toggle-blink">
						<span>Blink</span>
					</div>
					<div class="toggler" data-value="off" data-name="fall" data-default="off" data-click="toggle-fall">
						<span>Fall</span>
					</div>
				</div>
			</div>

			<div class="field-row has-button">
				<div class="option input">
					<span class="label">Seed</span>
					<span class="value">
						<div class="button">Randomize</div>
					</span>
				</div>
			</div>
		</div>
		<div class="buttons">
			<div class="button" data-click="dlg-ok">OK</div>
			<div class="button" data-click="dlg-reset">Reset</div>
			<div class="toggler" data-value="on" data-click="dlg-preview">
				<span>Preview</span>
			</div>
		</div>
	</div>
</div>
