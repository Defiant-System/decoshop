<div class="dialog-box" data-dlg="dlgHsbHsl">
	<div class="dlg-content">
		<div class="fields">
			<h2>
				<i class="icon-dlg-close" data-click="dlg-close"></i>
				HSB / HSL
			</h2>

			<div class="field-row">
				<div class="option opt-group">
					<span class="label">Input</span>
					<span class="value">
						<ul class="opt-group" data-default="RGBC" data-name="input" data-click="set-input">
							<li data-value="RGBC" class="active">RGB</li>
							<li data-value="HSBl">HSB</li>
							<li data-value="HSLC">HSL</li>
						</ul>
					</span>
				</div>
			</div>

			<div class="field-row">
				<div class="option opt-group">
					<span class="label">Output</span>
					<span class="value">
						<ul class="opt-group" data-default="HSBl" data-name="output" data-click="set-output">
							<li data-value="RGBC">RGB</li>
							<li data-value="HSBl" class="active">HSB</li>
							<li data-value="HSLC">HSL</li>
						</ul>
					</span>
				</div>
			</div>
		</div>
		<div class="buttons">
			<div class="button" data-click="dlg-ok">OK</div>
			<div class="button" data-click="dlg-reset">Reset</div>
			<div class="toggler" data-value="on" data-click="dlg-preview">
				<span>Preview</span>
			</div>
		</div>
	</div>
</div>
