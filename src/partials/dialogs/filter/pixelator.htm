<div class="dialog-box" data-dlg="dlgPixelator">
	<div class="dlg-content">
		<div class="fields">
			<h2>
				<i class="icon-dlg-close" data-click="dlg-close"></i>
				Pixelator
			</h2>
			
			<div class="presets">
				<div class="preset-head">
					Presets
				</div>
				<ul class="opt-group" data-click="select-preset">
					<li data-id="prst-1">1</li>
					<li data-id="prst-2">2</li>
					<li data-id="prst-3">3</li>
					<li data-id="prst-4">4</li>
					<li data-id="prst-5">5</li>
					<li data-id="prst-6">6</li>
					<li data-id="prst-7">7</li>
					<li data-id="prst-8">8</li>
					<li data-id="prst-9">9</li>
					<li data-id="prst-10">10</li>
				</ul>
			</div>

			<div class="layers">
				<div class="list-head">
					<div class="row">
						<div>Shape</div>
						<div>Spacing</div>
						<div>Size</div>
						<div>Offset</div>
						<div>Alpha</div>
					</div>
				</div>
				<div class="list-body">
					<!-- preset layer list goes here -->

					<!-- bubble displayed above bars -->
					<div class="hover-bubble hidden">100%</div>
					<!-- knob displayed above layer attribute numbers -->
					<div class="inline-menubox arrow-below hover-knob hidden">
						<div class="inline-content"><div class="knob"></div></div>
					</div>
					<!-- add more layers -->
					<div class="add-row" data-click="add-layer">
						<i class="icon-add-layer"></i>
						Add Layer
					</div>
				</div>
			</div>
		</div>
		<div class="buttons">
			<div class="button" data-click="dlg-ok">OK</div>
			<div class="button" data-click="dlg-reset">Reset</div>
			<div class="toggler" data-value="on" data-click="dlg-preview">
				<span>Preview</span>
			</div>
		</div>
	</div>
</div>
