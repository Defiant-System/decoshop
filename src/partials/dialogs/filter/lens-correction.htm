<div class="dialog-box" data-dlg="dlgLensCorrection">
	<div class="dlg-content">
		<div class="fields">
			<h2>
				<i class="icon-dlg-close" data-click="dlg-close"></i>
				Lens Correction
			</h2>

			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Amount</span>
					<span class="value"><input type="text" name="radius" data-min="0" data-max="50" data-default="0" value="0" data-default="0"></span>
				</div>
				<div class="knob" data-change="set-amount"></div>
			</div>

			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Scale</span>
					<span class="value"><input type="text" name="radius" data-min="10" data-max="150" data-default="100%" value="100%" data-suffix="%"></span>
				</div>
				<div class="knob" data-change="set-scale"></div>
			</div>
		</div>
		<div class="buttons">
			<div class="button" data-click="dlg-ok">OK</div>
			<div class="button" data-click="dlg-reset">Reset</div>
			<div class="toggler" data-value="on" data-click="dlg-preview">
				<span>Preview</span>
			</div>
		</div>
	</div>
</div>
