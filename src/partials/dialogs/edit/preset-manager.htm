<div class="dialog-box" data-dlg="dlgStroke">
	<div class="dlg-content">
		<div class="fields">
			<h2>
				<i class="icon-dlg-close" data-click="dlg-close"></i>
				Stroke
			</h2>
			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Width</span>
					<span class="value">
						<input type="text" name="size" value="12px" data-min="2" data-max="100" data-default="12" data-suffix="px">
					</span>
				</div>
				<div class="knob" data-change="set-size"></div>
			</div>
			<div class="field-row">
				<div class="option preset">
					<span class="label">
						Color
					</span>
					<span class="preset-value">
						<i class="icon icon-color-preset"></i>
						<span class="value" style="background: #eb261f;"></span>
					</span>
				</div>
			</div>
			<div class="field-row">
				<div class="option select" data-change="set-stroke-location" data-match="//StrokeLocations">
					<span class="label">Location</span>
					<span class="fld-value">
						<span class="value">Inside</span>
					</span>
				</div>
			</div>
			<div class="field-row">
				<div class="option select" data-change="set-stroke-blend" data-match="//BlendModes">
					<span class="label">Blend</span>
					<span class="fld-value">
						<span class="value">Normal</span>
					</span>
				</div>
			</div>
			<div class="field-row has-knob">
				<div class="option input">
					<span class="label">Opacity</span>
					<span class="value">
						<input type="text" name="opacity" value="100%" data-min="2" data-max="100" data-default="12" data-suffix="%">
					</span>
				</div>
				<div class="knob" data-change="set-opacity"></div>
			</div>
		</div>
		<div class="buttons">
			<div class="button" data-click="dlg-ok">OK</div>
			<div class="button" data-click="dlg-reset">Reset</div>
			<div class="toggler" data-value="on" data-click="dlg-preview">
				<span>Preview</span>
			</div>
		</div>
	</div>
</div>
